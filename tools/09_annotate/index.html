<html lang="ja">
<head>

<title>Ｏ絵カき — 矢印・枠・文字入れツール</title>
<meta name="description" content="Ｏ絵カき — 画像に矢印・四角枠・丸枠・テキストを重ねて書き出せる簡易注釈ツール。画像はブラウザ内で処理され、サーバーへのアップロードは行いません。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #060606;
  --bg-secondary: #0f0f0f;
  --text-primary: #eee;
  --text-sub: #9a9a9a;
  --border: #181818;
  --btn-bg: #fff;
  --btn-text: #000;
  --toolbar-bg: #0f0f0f;
  --toolbar-border: #222;
  --tool-hover: #1a1a1a;
  --tool-active: #2a2a2a;
  --drop-bg: #0a0a0a;
  --drop-border: #333;
  --drop-hover-border: #555;
}

[data-theme="light"] {
  --bg-primary: #f5f3f0;
  --bg-secondary: #fff;
  --text-primary: #1a1a1a;
  --text-sub: #666;
  --border: #e0ddd8;
  --btn-bg: #1a1a1a;
  --btn-text: #fff;
  --toolbar-bg: #fff;
  --toolbar-border: #e0ddd8;
  --tool-hover: #f0ede8;
  --tool-active: #e5e2dd;
  --drop-bg: #fff;
  --drop-border: #ccc;
  --drop-hover-border: #999;
}

body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

a { color: var(--text-sub); text-decoration: none; }
a:hover { color: var(--text-primary); }

.container {
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 0 20px;
}

/* Nav */
nav {
  padding: 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
nav a { font-size: 0.85rem; }

.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-sub);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
  transition: color 0.3s, border-color 0.3s;
}
.theme-toggle:hover { color: var(--text-primary); border-color: var(--text-sub); }

/* Header */
header {
  text-align: center;
  padding: 40px 0 10px;
}
header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
header p {
  color: var(--text-sub);
  font-size: 0.9rem;
  margin-top: 8px;
}

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--drop-border);
  border-radius: 12px;
  background: var(--drop-bg);
  padding: 60px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-top: 24px;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--drop-hover-border);
}
.drop-zone p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.8; }
.drop-zone .hint { font-size: 0.78rem; color: var(--text-sub); opacity: 0.7; margin-top: 8px; }

/* Editor area */
.editor { display: block; margin-top: 24px; }
.editor .canvas-wrapper { display: none; }
.editor .actions { display: none; }
.editor.active .canvas-wrapper { display: block; }
.editor.active .actions { display: flex; }

/* Toolbar */
.toolbar {
  position: relative;
  background: var(--toolbar-bg);
  border: 1px solid var(--toolbar-border);
  border-radius: 10px;
  padding: 8px 12px;
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  align-items: center;
  gap: 4px;
  margin-bottom: 12px;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}

.toolbar-sep {
  width: 1px;
  height: 24px;
  flex-shrink: 0;
  background: var(--toolbar-border);
  margin: 0 4px;
}

.tool-btn {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  border: 1px solid transparent;
  border-radius: 6px;
  background: none;
  color: var(--text-sub);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.tool-btn:hover { background: var(--tool-hover); color: var(--text-primary); }
.tool-btn.active { background: var(--tool-active); color: var(--text-primary); border-color: var(--toolbar-border); }
.tool-btn svg { width: 16px; height: 16px; pointer-events: none; }

/* Color chips */
.color-chip {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
}
.color-chip:hover { transform: scale(1.15); }
.color-chip.active { border-color: var(--text-primary); }

/* Size selector */
.size-btn {
  background: none;
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--text-sub);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.7rem;
  padding: 3px 6px;
  flex-shrink: 0;
  transition: all 0.15s;
}
.size-btn:hover { color: var(--text-primary); }
.size-btn.active { background: var(--tool-active); color: var(--text-primary); border-color: var(--toolbar-border); }

/* Icon toggle buttons (outline, fill) */
.icon-toggle {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  border: 1px solid transparent;
  border-radius: 6px;
  background: none;
  color: var(--text-sub);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.icon-toggle:hover { background: var(--tool-hover); color: var(--text-primary); }
.icon-toggle.active { background: var(--tool-active); color: var(--text-primary); border-color: var(--toolbar-border); }
.icon-toggle svg { width: 16px; height: 16px; pointer-events: none; }

/* Canvas wrapper */
.canvas-wrapper {
  position: relative;
  display: block;
  border-radius: 8px;
  overflow: hidden;
  cursor: crosshair;
  line-height: 0;
  margin: 0 auto;
}
.canvas-wrapper.cursor-select { cursor: default; }
.canvas-wrapper.cursor-grab { cursor: grab; }
.canvas-wrapper.cursor-grabbing { cursor: grabbing; }
.canvas-wrapper.cursor-nwse-resize { cursor: nwse-resize; }
.canvas-wrapper.cursor-eyedropper { cursor: none; }
.canvas-wrapper canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Loupe for eyedropper */
#annotateLoupe {
  position: fixed;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  pointer-events: none;
  display: none;
  z-index: 200;
  image-rendering: pixelated;
}
#loupeHexLabel {
  position: fixed;
  pointer-events: none;
  display: none;
  z-index: 201;
  background: #000;
  color: #fff;
  font-size: 10px;
  font-family: 'Inter', monospace;
  padding: 2px 6px;
  border-radius: 3px;
  text-align: center;
  white-space: nowrap;
}
#overlayCanvas {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: auto;
}

/* Text input overlay */
.text-input-overlay {
  position: absolute;
  display: none;
  z-index: 10;
}
.text-input-overlay input {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  font-weight: 700;
  background: rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 4px;
  padding: 6px 10px;
  outline: none;
  min-width: 200px;
  color: #fff;
  caret-color: #fff;
}

/* Action buttons */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--btn-bg); color: var(--btn-text); }
.btn-secondary {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-sub);
}
.btn-secondary:hover { color: var(--text-primary); border-color: var(--text-sub); }

/* Output size selector */
.output-size-select {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.output-size-select:hover { border-color: var(--text-sub); }
.output-size-select:focus { border-color: var(--text-sub); }

/* Footer */
footer {
  margin-top: auto;
  padding: 40px 0 20px;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-sub);
  opacity: 0.7;
}

/* Mosaic popup */
.mosaic-popup {
  display: none;
  position: absolute;
  z-index: 100;
  background: var(--toolbar-bg);
  border: 1px solid var(--toolbar-border);
  border-radius: 8px;
  padding: 12px 14px;
  min-width: 180px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.mosaic-popup.open { display: block; }
.mosaic-popup-section { margin-bottom: 10px; }
.mosaic-popup-section:last-child { margin-bottom: 0; }
.mosaic-popup-label {
  font-size: 0.7rem;
  color: var(--text-sub);
  margin-bottom: 6px;
}
.mosaic-popup-row {
  display: flex;
  gap: 4px;
}
.mosaic-popup-btn {
  background: none;
  border: 1px solid var(--toolbar-border);
  border-radius: 4px;
  color: var(--text-sub);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.7rem;
  padding: 4px 10px;
  transition: all 0.15s;
  white-space: nowrap;
}
.mosaic-popup-btn:hover { color: var(--text-primary); }
.mosaic-popup-btn.active {
  background: var(--tool-active);
  color: var(--text-primary);
  border-color: var(--toolbar-border);
}

/* Responsive */
@media (max-width: 600px) {
  header h1 { font-size: 1.4rem; }
  .toolbar { gap: 3px; padding: 4px 6px; }
  .tool-btn { width: 28px; height: 28px; }
  .icon-toggle { width: 26px; height: 26px; }
  .toolbar-sep { margin: 0 2px; }
  .color-chip { width: 18px; height: 18px; }
}
</style>

<script>
(function() {
  'use strict';

  // --- Theme ---
  var themeToggle = document.getElementById('themeToggle');
  var savedTheme = localStorage.getItem('annotate-theme') || 'dark';
  if (savedTheme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    themeToggle.textContent = 'Dark';
  }
  themeToggle.addEventListener('click', function() {
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.textContent = 'Light';
      localStorage.setItem('annotate-theme', 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      themeToggle.textContent = 'Dark';
      localStorage.setItem('annotate-theme', 'light');
    }
  });

  // --- Elements ---
  var dropZone = document.getElementById('dropZone');
  var fileInput = document.getElementById('fileInput');
  var editorEl = document.getElementById('editor');
  var baseCanvas = document.getElementById('baseCanvas');
  var overlayCanvas = document.getElementById('overlayCanvas');
  var canvasWrapper = document.getElementById('canvasWrapper');
  var textInputEl = document.getElementById('textInput');
  var textField = document.getElementById('textField');
  var mosaicPopup = document.getElementById('mosaicPopup');
  var mosaicBtn = document.getElementById('mosaicBtn');

  var baseCtx = baseCanvas.getContext('2d');
  var overlayCtx = overlayCanvas.getContext('2d');

  // --- State ---
  var currentTool = 'select';
  var currentColor = '#e74c3c';
  var currentWidth = 4;
  var currentFontSize = 24;
  var currentBlockSize = 16;
  var objects = [];       // array of drawing objects
  var isDrawing = false;
  var startX = 0, startY = 0;
  var freehandPoints = [];
  var loadedImage = null;

  // Selection state
  var selectedObject = null;
  var isDragging = false;
  var dragOffsetX = 0, dragOffsetY = 0;

  // Resize state
  var isResizing = false;
  var resizeStartX = 0, resizeStartY = 0;
  var resizeOrigObj = null; // snapshot before resize

  // Outline state
  var outlineEnabled = true;

  // Fill state
  var fillEnabled = false;

  // Mosaic shape state
  var currentMosaicShape = 'pen';

  // Mosaic pen state
  var mosaicPoints = [];

  // --- File loading ---
  dropZone.addEventListener('click', function() { fileInput.click(); });
  fileInput.addEventListener('change', function(e) {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    var files = e.dataTransfer.files;
    if (files.length && files[0].type.startsWith('image/')) loadImage(files[0]);
  });

  // Clipboard paste
  document.addEventListener('paste', function(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.startsWith('image/')) {
        loadImage(items[i].getAsFile());
        break;
      }
    }
  });

  function loadImage(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        loadedImage = img;
        setupCanvas(img);
        dropZone.style.display = 'none';
        editorEl.classList.add('active');
        objects = [];
        selectedObject = null;
        textInputEl.style.display = 'none';
        currentTool = 'select';
        document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
        var selectBtn = document.querySelector('.tool-btn[data-tool="select"]');
        if (selectBtn) selectBtn.classList.add('active');
        updateCursor();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function setupCanvas(img) {
    var w = img.naturalWidth;
    var h = img.naturalHeight;

    // Limit display size to fit container
    var maxW = canvasWrapper.parentElement.offsetWidth || 800;
    var maxH = window.innerHeight * 0.7;
    var scale = Math.min(1, maxW / w, maxH / h);
    var displayW = Math.round(w * scale);
    var displayH = Math.round(h * scale);

    // Set canvas internal resolution to original image size
    baseCanvas.width = w;
    baseCanvas.height = h;
    overlayCanvas.width = w;
    overlayCanvas.height = h;

    // Set wrapper to display size so both canvases match
    canvasWrapper.style.width = displayW + 'px';
    canvasWrapper.style.height = displayH + 'px';

    baseCtx.drawImage(img, 0, 0);
    overlayCtx.clearRect(0, 0, w, h);
  }

  // --- Coordinate helpers ---
  function getCanvasCoords(e) {
    var rect = overlayCanvas.getBoundingClientRect();
    var x = (e.clientX - rect.left) * (overlayCanvas.width / rect.width);
    var y = (e.clientY - rect.top) * (overlayCanvas.height / rect.height);
    return { x: x, y: y };
  }

  // --- Tool selection ---
  document.querySelectorAll('.tool-btn[data-tool]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      var tool = btn.getAttribute('data-tool');

      // Mosaic: show popup instead of directly activating
      if (tool === 'mosaic') {
        e.stopPropagation();
        if (mosaicPopup.classList.contains('open')) {
          mosaicPopup.classList.remove('open');
          return;
        }
        // Position popup below the mosaic button
        var btnRect = btn.getBoundingClientRect();
        var toolbarRect = document.getElementById('toolbar').getBoundingClientRect();
        mosaicPopup.style.left = (btnRect.left - toolbarRect.left) + 'px';
        mosaicPopup.style.top = (btnRect.bottom - toolbarRect.top + 4) + 'px';
        mosaicPopup.classList.add('open');
        return;
      }

      // Close mosaic popup for other tools
      mosaicPopup.classList.remove('open');

      document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentTool = tool;
      updateCursor();
      if (currentTool !== 'select') {
        deselectAll();
        renderAll();
      }
    });
  });

  // --- Mosaic popup interactions ---
  mosaicPopup.addEventListener('click', function(e) {
    e.stopPropagation();
    var target = e.target;
    if (!target.classList.contains('mosaic-popup-btn')) return;

    if (target.hasAttribute('data-blocksize')) {
      // Coarseness selection
      mosaicPopup.querySelectorAll('[data-blocksize]').forEach(function(b) { b.classList.remove('active'); });
      target.classList.add('active');
      currentBlockSize = parseInt(target.getAttribute('data-blocksize'));
    }
    if (target.hasAttribute('data-shape')) {
      // Shape selection
      mosaicPopup.querySelectorAll('[data-shape]').forEach(function(b) { b.classList.remove('active'); });
      target.classList.add('active');
      currentMosaicShape = target.getAttribute('data-shape');
    }

    // Always activate mosaic tool and close popup on any button click
    mosaicPopup.classList.remove('open');
    document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
    mosaicBtn.classList.add('active');
    currentTool = 'mosaic';
    updateCursor();
    deselectAll();
    renderAll();
  });

  // Close popup when clicking outside
  document.addEventListener('click', function(e) {
    if (!mosaicPopup.contains(e.target) && e.target !== mosaicBtn && !mosaicBtn.contains(e.target)) {
      mosaicPopup.classList.remove('open');
    }
  });

  function updateCursor() {
    canvasWrapper.classList.remove('cursor-select', 'cursor-grab', 'cursor-grabbing', 'cursor-eyedropper');
    if (currentTool === 'select') {
      canvasWrapper.classList.add('cursor-select');
    } else if (currentTool === 'eyedropper') {
      canvasWrapper.classList.add('cursor-eyedropper');
    }
  }

  // Color selection
  document.querySelectorAll('.color-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.color-chip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      currentColor = chip.getAttribute('data-color');
    });
  });

  // Line width
  document.querySelectorAll('.size-btn[data-width]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.size-btn[data-width]').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentWidth = parseInt(btn.getAttribute('data-width'));
    });
  });

  // --- Outline toggle ---
  var outlineToggle = document.getElementById('outlineToggle');
  outlineToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    outlineEnabled = !outlineEnabled;
    outlineToggle.classList.toggle('active', outlineEnabled);
    // Apply to selected object
    if (selectedObject && (selectedObject.type === 'rect' || selectedObject.type === 'ellipse' || selectedObject.type === 'text')) {
      selectedObject.outline = outlineEnabled;
      renderAll();
    }
  });

  // --- Fill toggle ---
  var fillToggle = document.getElementById('fillToggle');
  fillToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    fillEnabled = !fillEnabled;
    fillToggle.classList.toggle('active', fillEnabled);
    // Apply to selected object
    if (selectedObject && (selectedObject.type === 'rect' || selectedObject.type === 'ellipse')) {
      selectedObject.filled = fillEnabled;
      renderAll();
    }
  });

  // --- Scaled dimensions ---
  function scaledWidth() {
    var displayW = overlayCanvas.getBoundingClientRect().width;
    var ratio = overlayCanvas.width / displayW;
    return currentWidth * ratio;
  }

  function scaledFontSize() {
    var displayW = overlayCanvas.getBoundingClientRect().width;
    var ratio = overlayCanvas.width / displayW;
    return currentFontSize * ratio;
  }

  // =============================================
  // Object-based drawing system
  // =============================================

  function deselectAll() {
    if (selectedObject) {
      selectedObject.selected = false;
      selectedObject = null;
    }
  }

  function selectObject(obj) {
    deselectAll();
    obj.selected = true;
    selectedObject = obj;

    // Sync toolbar toggles with the selected object's properties
    if (obj.type === 'rect' || obj.type === 'ellipse') {
      // Sync outline toggle
      if (obj.outline === false) {
        outlineEnabled = false;
        outlineToggle.classList.remove('active');
      } else {
        outlineEnabled = true;
        outlineToggle.classList.add('active');
      }
      // Sync fill toggle
      if (obj.filled) {
        fillEnabled = true;
        fillToggle.classList.add('active');
      } else {
        fillEnabled = false;
        fillToggle.classList.remove('active');
      }
    }
  }

  // --- Bounding box calculation ---
  function getBoundingBox(obj) {
    var pad = (obj.lineWidth || 4) + 6;
    switch (obj.type) {
      case 'arrow':
        return {
          x: Math.min(obj.x1, obj.x2) - pad,
          y: Math.min(obj.y1, obj.y2) - pad,
          w: Math.abs(obj.x2 - obj.x1) + pad * 2,
          h: Math.abs(obj.y2 - obj.y1) + pad * 2
        };
      case 'rect':
        return {
          x: Math.min(obj.x1, obj.x2) - pad,
          y: Math.min(obj.y1, obj.y2) - pad,
          w: Math.abs(obj.x2 - obj.x1) + pad * 2,
          h: Math.abs(obj.y2 - obj.y1) + pad * 2
        };
      case 'ellipse':
        return {
          x: Math.min(obj.x1, obj.x2) - pad,
          y: Math.min(obj.y1, obj.y2) - pad,
          w: Math.abs(obj.x2 - obj.x1) + pad * 2,
          h: Math.abs(obj.y2 - obj.y1) + pad * 2
        };
      case 'freehand': {
        var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (var i = 0; i < obj.points.length; i++) {
          if (obj.points[i].x < minX) minX = obj.points[i].x;
          if (obj.points[i].y < minY) minY = obj.points[i].y;
          if (obj.points[i].x > maxX) maxX = obj.points[i].x;
          if (obj.points[i].y > maxY) maxY = obj.points[i].y;
        }
        return {
          x: minX - pad,
          y: minY - pad,
          w: (maxX - minX) + pad * 2,
          h: (maxY - minY) + pad * 2
        };
      }
      case 'text': {
        // Measure text width using canvas
        var fs = obj.fontSize;
        overlayCtx.font = '700 ' + fs + 'px Inter, "Noto Sans JP", sans-serif';
        var tw = overlayCtx.measureText(obj.text).width;
        return {
          x: obj.x1 - 4,
          y: obj.y1 - 4,
          w: tw + 8,
          h: fs * 1.3 + 8
        };
      }
      case 'mosaic': {
        if (obj.mosaicShape === 'pen' && obj.points && obj.points.length > 0) {
          var mMinX = Infinity, mMinY = Infinity, mMaxX = -Infinity, mMaxY = -Infinity;
          var mBw = obj.brushWidth || obj.blockSize * 3;
          var mHalf = Math.floor(mBw / 2);
          for (var mi = 0; mi < obj.points.length; mi++) {
            if (obj.points[mi].x - mHalf < mMinX) mMinX = obj.points[mi].x - mHalf;
            if (obj.points[mi].y - mHalf < mMinY) mMinY = obj.points[mi].y - mHalf;
            if (obj.points[mi].x + mHalf > mMaxX) mMaxX = obj.points[mi].x + mHalf;
            if (obj.points[mi].y + mHalf > mMaxY) mMaxY = obj.points[mi].y + mHalf;
          }
          return { x: mMinX - 2, y: mMinY - 2, w: (mMaxX - mMinX) + 4, h: (mMaxY - mMinY) + 4 };
        }
        var mx = Math.min(obj.x1, obj.x2);
        var my = Math.min(obj.y1, obj.y2);
        return {
          x: mx - 2,
          y: my - 2,
          w: Math.abs(obj.x2 - obj.x1) + 4,
          h: Math.abs(obj.y2 - obj.y1) + 4
        };
      }
      default:
        return { x: 0, y: 0, w: 0, h: 0 };
    }
  }

  // --- Hit testing ---
  function hitTest(obj, px, py) {
    switch (obj.type) {
      case 'arrow':
        return distToSegment(px, py, obj.x1, obj.y1, obj.x2, obj.y2) < (obj.lineWidth + 10);
      case 'rect':
      case 'ellipse':
      case 'freehand':
      case 'text':
      case 'mosaic': {
        var bb = getBoundingBox(obj);
        return px >= bb.x && px <= bb.x + bb.w && py >= bb.y && py <= bb.y + bb.h;
      }
      default:
        return false;
    }
  }

  // Distance from point to line segment
  function distToSegment(px, py, x1, y1, x2, y2) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.sqrt((px - x1) * (px - x1) + (py - y1) * (py - y1));
    var t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    var nearX = x1 + t * dx;
    var nearY = y1 + t * dy;
    return Math.sqrt((px - nearX) * (px - nearX) + (py - nearY) * (py - nearY));
  }

  // Find topmost object at point (iterate in reverse for z-order)
  function findObjectAt(px, py) {
    for (var i = objects.length - 1; i >= 0; i--) {
      if (hitTest(objects[i], px, py)) return objects[i];
    }
    return null;
  }

  // --- Resize handle hit test ---
  function hitResizeHandle(obj, px, py) {
    if (!obj || !obj.selected) return false;
    if (obj.type === 'mosaic') return false;
    var bb = getBoundingBox(obj);
    var hx = bb.x + bb.w;
    var hy = bb.y + bb.h;
    var handleSize = 12;
    return px >= hx - handleSize && px <= hx + handleSize && py >= hy - handleSize && py <= hy + handleSize;
  }

  // --- Check if mouse is over resize handle (for cursor) ---
  function isOverResizeHandle(px, py) {
    if (!selectedObject || !selectedObject.selected) return false;
    return hitResizeHandle(selectedObject, px, py);
  }

  // --- Deep clone object for undo snapshot ---
  function cloneObject(obj) {
    var c = {};
    for (var k in obj) {
      if (k === 'points' && Array.isArray(obj[k])) {
        c[k] = [];
        for (var i = 0; i < obj[k].length; i++) {
          c[k].push({ x: obj[k][i].x, y: obj[k][i].y });
        }
      } else {
        c[k] = obj[k];
      }
    }
    return c;
  }

  // --- Resize object ---
  function resizeObject(obj, dx, dy, shiftKey) {
    switch (obj.type) {
      case 'arrow':
      case 'rect':
      case 'ellipse':
        if (shiftKey) {
          // Maintain aspect ratio
          var ow = obj.x2 - obj.x1;
          var oh = obj.y2 - obj.y1;
          var ratio = (ow === 0) ? 1 : Math.abs(oh / ow);
          if (Math.abs(dx) * ratio > Math.abs(dy)) {
            dy = dx * ratio * (oh >= 0 ? 1 : -1) * (dx >= 0 ? 1 : 1);
            if ((ow >= 0 && dx < 0) || (ow < 0 && dx > 0)) dy = -dy;
            if (oh >= 0) dy = Math.abs(dx) * ratio;
            else dy = -Math.abs(dx) * ratio;
          } else {
            dx = Math.abs(dy) / (ratio || 1);
            if (ow < 0) dx = -dx;
          }
        }
        obj.x2 += dx;
        obj.y2 += dy;
        break;
      case 'text': {
        // Scale font size based on drag delta
        var bb = getBoundingBox(obj);
        var origH = bb.h;
        var newH = origH + dy;
        if (newH < 8) newH = 8;
        var scale = newH / origH;
        obj.fontSize = Math.max(8, obj.fontSize * scale);
        break;
      }
      case 'freehand': {
        // Scale all points relative to bounding box
        var bb2 = getBoundingBox(obj);
        var pad = (obj.lineWidth || 4) + 6;
        var minX = bb2.x + pad;
        var minY = bb2.y + pad;
        var bw = bb2.w - pad * 2;
        var bh = bb2.h - pad * 2;
        if (bw < 1) bw = 1;
        if (bh < 1) bh = 1;
        var newW = bw + dx;
        var newH2 = bh + dy;
        if (shiftKey) {
          var fRatio = bw / bh;
          newH2 = newW / fRatio;
        }
        if (newW < 4) newW = 4;
        if (newH2 < 4) newH2 = 4;
        var scaleX = newW / bw;
        var scaleY = newH2 / bh;
        for (var i = 0; i < obj.points.length; i++) {
          obj.points[i].x = minX + (obj.points[i].x - minX) * scaleX;
          obj.points[i].y = minY + (obj.points[i].y - minY) * scaleY;
        }
        break;
      }
    }
  }

  // --- Move object ---
  function moveObject(obj, dx, dy) {
    switch (obj.type) {
      case 'arrow':
      case 'rect':
      case 'ellipse':
        obj.x1 += dx;
        obj.y1 += dy;
        obj.x2 += dx;
        obj.y2 += dy;
        break;
      case 'freehand':
        for (var i = 0; i < obj.points.length; i++) {
          obj.points[i].x += dx;
          obj.points[i].y += dy;
        }
        break;
      case 'text':
        obj.x1 += dx;
        obj.y1 += dy;
        break;
      case 'mosaic':
        if (obj.mosaicShape === 'pen' && obj.points) {
          for (var mi = 0; mi < obj.points.length; mi++) {
            obj.points[mi].x += dx;
            obj.points[mi].y += dy;
          }
        } else {
          obj.x1 += dx;
          obj.y1 += dy;
          obj.x2 += dx;
          obj.y2 += dy;
        }
        break;
    }
  }

  // =============================================
  // Rendering
  // =============================================

  function renderAll() {
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    for (var i = 0; i < objects.length; i++) {
      renderObject(objects[i]);
    }
    // Draw selection indicator on top
    if (selectedObject && selectedObject.selected) {
      drawSelectionBox(selectedObject);
    }
  }

  function renderObject(obj) {
    overlayCtx.save();
    overlayCtx.strokeStyle = obj.color;
    overlayCtx.lineWidth = obj.lineWidth;
    overlayCtx.lineCap = 'round';
    overlayCtx.lineJoin = 'round';

    switch (obj.type) {
      case 'arrow':
        drawArrow(overlayCtx, obj.x1, obj.y1, obj.x2, obj.y2, obj.lineWidth);
        break;
      case 'rect':
        if (obj.filled && obj.outline !== false) {
          // Fill + stroke
          overlayCtx.fillStyle = obj.color;
          overlayCtx.fillRect(obj.x1, obj.y1, obj.x2 - obj.x1, obj.y2 - obj.y1);
          overlayCtx.beginPath();
          overlayCtx.rect(obj.x1, obj.y1, obj.x2 - obj.x1, obj.y2 - obj.y1);
          overlayCtx.stroke();
        } else if (obj.filled && obj.outline === false) {
          // Fill only (no stroke)
          overlayCtx.fillStyle = obj.color;
          overlayCtx.fillRect(obj.x1, obj.y1, obj.x2 - obj.x1, obj.y2 - obj.y1);
        } else if (!obj.filled && obj.outline !== false) {
          // Stroke only
          overlayCtx.beginPath();
          overlayCtx.rect(obj.x1, obj.y1, obj.x2 - obj.x1, obj.y2 - obj.y1);
          overlayCtx.stroke();
        }
        // !filled && outline===false -> nothing drawn
        break;
      case 'ellipse':
        if (obj.filled && obj.outline !== false) {
          drawEllipseFill(overlayCtx, obj.x1, obj.y1, obj.x2, obj.y2, obj.color);
          drawEllipse(overlayCtx, obj.x1, obj.y1, obj.x2, obj.y2);
        } else if (obj.filled && obj.outline === false) {
          drawEllipseFill(overlayCtx, obj.x1, obj.y1, obj.x2, obj.y2, obj.color);
        } else if (!obj.filled && obj.outline !== false) {
          drawEllipse(overlayCtx, obj.x1, obj.y1, obj.x2, obj.y2);
        }
        break;
      case 'freehand':
        drawFreehandFromPoints(overlayCtx, obj.points);
        break;
      case 'text':
        drawTextObject(overlayCtx, obj);
        break;
      case 'mosaic':
        drawMosaic(obj);
        break;
    }
    overlayCtx.restore();
  }

  function drawMosaic(obj) {
    var shape = obj.mosaicShape || 'rect';
    if (shape === 'pen') {
      drawPenMosaic(obj);
      return;
    }
    // rect shape
    var x = Math.min(obj.x1, obj.x2);
    var y = Math.min(obj.y1, obj.y2);
    var w = Math.abs(obj.x2 - obj.x1);
    var h = Math.abs(obj.y2 - obj.y1);
    if (w < 1 || h < 1) return;
    var bs = obj.blockSize;

    var cx = Math.max(0, Math.round(x));
    var cy = Math.max(0, Math.round(y));
    var cw = Math.min(Math.round(w), baseCanvas.width - cx);
    var ch = Math.min(Math.round(h), baseCanvas.height - cy);
    if (cw < 1 || ch < 1) return;

    var baseData = baseCtx.getImageData(cx, cy, cw, ch);

    for (var by = 0; by < ch; by += bs) {
      for (var bx = 0; bx < cw; bx += bs) {
        var r = 0, g = 0, b = 0, count = 0;
        for (var dy = 0; dy < bs && by + dy < ch; dy++) {
          for (var dx = 0; dx < bs && bx + dx < cw; dx++) {
            var idx = ((by + dy) * cw + (bx + dx)) * 4;
            r += baseData.data[idx];
            g += baseData.data[idx + 1];
            b += baseData.data[idx + 2];
            count++;
          }
        }
        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);

        overlayCtx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
        overlayCtx.fillRect(cx + bx, cy + by,
          Math.min(bs, cw - bx), Math.min(bs, ch - by));
      }
    }
  }

  function drawPenMosaic(obj) {
    var bs = obj.blockSize;
    var bw = obj.brushWidth || bs * 3;
    var half = Math.floor(bw / 2);
    var canvasW = baseCanvas.width, canvasH = baseCanvas.height;

    var processed = {};

    // Interpolate between consecutive points to fill gaps
    var allPoints = [];
    if (obj.points && obj.points.length > 0) {
      allPoints.push(obj.points[0]);
      for (var pi = 1; pi < obj.points.length; pi++) {
        var p0 = obj.points[pi - 1];
        var p1 = obj.points[pi];
        var dist = Math.sqrt((p1.x - p0.x) * (p1.x - p0.x) + (p1.y - p0.y) * (p1.y - p0.y));
        var steps = Math.max(1, Math.ceil(dist / (bs * 0.5)));
        for (var si = 1; si <= steps; si++) {
          var t = si / steps;
          allPoints.push({ x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t });
        }
      }
    }

    for (var i = 0; i < allPoints.length; i++) {
      var pt = allPoints[i];
      var startX = Math.max(0, Math.floor((pt.x - half) / bs) * bs);
      var startY = Math.max(0, Math.floor((pt.y - half) / bs) * bs);
      var endX = Math.min(canvasW, pt.x + half);
      var endY = Math.min(canvasH, pt.y + half);

      for (var by = startY; by < endY; by += bs) {
        for (var bx = startX; bx < endX; bx += bs) {
          var key = bx + ',' + by;
          if (processed[key]) continue;
          processed[key] = true;

          var blockW = Math.min(bs, canvasW - bx);
          var blockH = Math.min(bs, canvasH - by);
          if (blockW < 1 || blockH < 1) continue;

          var data = baseCtx.getImageData(bx, by, blockW, blockH).data;
          var r = 0, g = 0, b = 0, count = 0;
          for (var di = 0; di < data.length; di += 4) {
            r += data[di]; g += data[di + 1]; b += data[di + 2]; count++;
          }
          r = Math.round(r / count); g = Math.round(g / count); b = Math.round(b / count);
          overlayCtx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
          overlayCtx.fillRect(bx, by, blockW, blockH);
        }
      }
    }
  }

  function drawSelectionBox(obj) {
    var bb = getBoundingBox(obj);
    overlayCtx.save();
    overlayCtx.strokeStyle = '#3498db';
    overlayCtx.lineWidth = 2;
    overlayCtx.setLineDash([6, 4]);
    overlayCtx.strokeRect(bb.x, bb.y, bb.w, bb.h);

    // Resize handle at bottom-right corner (skip for mosaic)
    if (obj.type !== 'mosaic') {
      var handleSize = 8;
      var hx = bb.x + bb.w - handleSize / 2;
      var hy = bb.y + bb.h - handleSize / 2;
      overlayCtx.setLineDash([]);
      overlayCtx.fillStyle = '#fff';
      overlayCtx.strokeStyle = '#3498db';
      overlayCtx.lineWidth = 2;
      overlayCtx.fillRect(hx, hy, handleSize, handleSize);
      overlayCtx.strokeRect(hx, hy, handleSize, handleSize);
    }

    overlayCtx.restore();
  }

  // --- Draw helpers ---
  function drawArrow(ctx, x1, y1, x2, y2, sw) {
    var headLen = Math.max(sw * 4, 16);
    var angle = Math.atan2(y2 - y1, x2 - x1);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function drawEllipseFill(ctx, x1, y1, x2, y2, fillColor) {
    var cx = (x1 + x2) / 2;
    var cy = (y1 + y2) / 2;
    var rx = Math.abs(x2 - x1) / 2;
    var ry = Math.abs(y2 - y1) / 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, Math.max(rx, 0.1), Math.max(ry, 0.1), 0, 0, Math.PI * 2);
    ctx.fillStyle = fillColor;
    ctx.fill();
  }

  function drawEllipse(ctx, x1, y1, x2, y2) {
    var cx = (x1 + x2) / 2;
    var cy = (y1 + y2) / 2;
    var rx = Math.abs(x2 - x1) / 2;
    var ry = Math.abs(y2 - y1) / 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, Math.max(rx, 0.1), Math.max(ry, 0.1), 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawFreehandFromPoints(ctx, points) {
    if (points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (var i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.stroke();
  }

  function drawTextObject(ctx, obj) {
    var fs = obj.fontSize;
    ctx.font = '700 ' + fs + 'px Inter, "Noto Sans JP", sans-serif';
    ctx.fillStyle = obj.color;
    ctx.textBaseline = 'top';

    // Text shadow/outline for readability (only if outline is enabled)
    if (obj.outline !== false) {
      ctx.strokeStyle = (obj.color === '#ffffff' || obj.color === '#f1c40f') ? '#000' : '#fff';
      ctx.lineWidth = fs * 0.12;
      ctx.lineJoin = 'round';
      ctx.strokeText(obj.text, obj.x1, obj.y1);
    }
    ctx.fillText(obj.text, obj.x1, obj.y1);
  }

  // =============================================
  // Event handlers
  // =============================================

  overlayCanvas.addEventListener('mousedown', onPointerDown);
  overlayCanvas.addEventListener('mousemove', onPointerMove);
  overlayCanvas.addEventListener('mouseup', onPointerUp);
  overlayCanvas.addEventListener('mouseleave', onPointerUp);

  // Touch support
  overlayCanvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    onPointerDown({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: function(){}, stopPropagation: function(){} });
  }, { passive: false });
  overlayCanvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    onPointerMove({ clientX: touch.clientX, clientY: touch.clientY, shiftKey: false });
  }, { passive: false });
  overlayCanvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    onPointerUp({});
  }, { passive: false });

  function onPointerDown(e) {
    var coords = getCanvasCoords(e);

    // --- Select mode ---
    if (currentTool === 'select') {
      // Check resize handle first
      if (selectedObject && hitResizeHandle(selectedObject, coords.x, coords.y)) {
        isResizing = true;
        resizeStartX = coords.x;
        resizeStartY = coords.y;
        resizeOrigObj = cloneObject(selectedObject);
        canvasWrapper.classList.add('cursor-nwse-resize');
        return;
      }

      var hit = findObjectAt(coords.x, coords.y);
      if (hit) {
        selectObject(hit);
        isDragging = true;
        dragOffsetX = coords.x;
        dragOffsetY = coords.y;
        canvasWrapper.classList.remove('cursor-grab');
        canvasWrapper.classList.add('cursor-grabbing');
      } else {
        deselectAll();
        isDragging = false;
      }
      renderAll();
      return;
    }

    // --- Eyedropper tool ---
    if (currentTool === 'eyedropper') {
      pickColor(coords.x, coords.y);
      return;
    }

    // --- Text tool ---
    if (currentTool === 'text') {
      e.preventDefault && e.preventDefault();
      e.stopPropagation && e.stopPropagation();
      setTimeout(function() { showTextInput(e); }, 50);
      return;
    }

    // --- Mosaic tool ---
    if (currentTool === 'mosaic') {
      isDrawing = true;
      startX = coords.x;
      startY = coords.y;
      if (currentMosaicShape === 'pen') {
        mosaicPoints = [{ x: coords.x, y: coords.y }];
      }
      return;
    }

    // --- Drawing tools ---
    isDrawing = true;
    startX = coords.x;
    startY = coords.y;
    if (currentTool === 'freehand') {
      freehandPoints = [{ x: startX, y: startY }];
    }
  }

  function onPointerMove(e) {
    var coords = getCanvasCoords(e);

    // --- Loupe for eyedropper ---
    if (currentTool === 'eyedropper' && loadedImage && document.getElementById('annotateLoupe')) {
      var _loupe = document.getElementById('annotateLoupe');
      var _hexLabel = document.getElementById('loupeHexLabel');
      _loupe.style.display = 'block';
      if (_hexLabel) _hexLabel.style.display = 'block';
      var _lCtx = _loupe.getContext('2d');
      var _ls = 160, _zoom = 12;
      var _ss = Math.ceil(_ls / _zoom);
      if (_ss % 2 === 0) _ss++;

      var _px = Math.floor(coords.x);
      var _py = Math.floor(coords.y);
      var _cw = baseCanvas.width, _ch = baseCanvas.height;
      _px = Math.max(0, Math.min(_px, _cw - 1));
      _py = Math.max(0, Math.min(_py, _ch - 1));

      // Center loupe on cursor
      _loupe.style.left = (e.clientX - _ls / 2) + 'px';
      _loupe.style.top = (e.clientY - _ls / 2) + 'px';

      // Position hex label below loupe (centered under cursor)
      if (_hexLabel) {
        _hexLabel.style.left = (e.clientX - 30) + 'px';
        _hexLabel.style.top = (e.clientY + _ls / 2 + 4) + 'px';
      }

      var _tc = document.createElement('canvas');
      _tc.width = _cw; _tc.height = _ch;
      var _tCtx = _tc.getContext('2d');
      _tCtx.drawImage(baseCanvas, 0, 0);
      _tCtx.drawImage(overlayCanvas, 0, 0);

      var _half = Math.floor(_ss / 2);
      _lCtx.clearRect(0, 0, _ls, _ls);
      var _cs = _ls / _ss;
      var _centerPixel = null;
      for (var _dy = -_half; _dy <= _half; _dy++) {
        for (var _dx = -_half; _dx <= _half; _dx++) {
          var _sx = Math.max(0, Math.min(_px + _dx, _cw - 1));
          var _sy = Math.max(0, Math.min(_py + _dy, _ch - 1));
          var _p = _tCtx.getImageData(_sx, _sy, 1, 1).data;
          _lCtx.fillStyle = 'rgb(' + _p[0] + ',' + _p[1] + ',' + _p[2] + ')';
          _lCtx.fillRect((_dx + _half) * _cs, (_dy + _half) * _cs, Math.ceil(_cs), Math.ceil(_cs));
          if (_dx === 0 && _dy === 0) _centerPixel = _p;
        }
      }
      // Center crosshair (thicker white lines)
      var _ctr = _half * _cs;
      var _m = _ctr + _cs / 2;
      _lCtx.strokeStyle = 'rgba(255,255,255,0.9)';
      _lCtx.lineWidth = 2;
      _lCtx.beginPath();
      _lCtx.moveTo(_m, 0); _lCtx.lineTo(_m, _ctr - 1);
      _lCtx.moveTo(_m, _ctr + _cs + 1); _lCtx.lineTo(_m, _ls);
      _lCtx.moveTo(0, _m); _lCtx.lineTo(_ctr - 1, _m);
      _lCtx.moveTo(_ctr + _cs + 1, _m); _lCtx.lineTo(_ls, _m);
      _lCtx.stroke();
      // Center pixel border
      _lCtx.strokeStyle = 'rgba(255,255,255,0.9)';
      _lCtx.lineWidth = 2;
      _lCtx.strokeRect(_ctr, _ctr, Math.ceil(_cs), Math.ceil(_cs));

      // HEX label
      if (_hexLabel && _centerPixel) {
        var _hex = '#' +
          ('0' + _centerPixel[0].toString(16)).slice(-2).toUpperCase() +
          ('0' + _centerPixel[1].toString(16)).slice(-2).toUpperCase() +
          ('0' + _centerPixel[2].toString(16)).slice(-2).toUpperCase();
        _hexLabel.textContent = _hex;
      }
      return;
    } else {
      if (document.getElementById('annotateLoupe')) document.getElementById('annotateLoupe').style.display = 'none';
      if (document.getElementById('loupeHexLabel')) document.getElementById('loupeHexLabel').style.display = 'none';
    }

    // --- Select mode: dragging / resizing ---
    if (currentTool === 'select') {
      if (isResizing && selectedObject) {
        var dx = coords.x - resizeStartX;
        var dy = coords.y - resizeStartY;
        resizeObject(selectedObject, dx, dy, e.shiftKey);
        resizeStartX = coords.x;
        resizeStartY = coords.y;
        renderAll();
      } else if (isDragging && selectedObject) {
        var dx = coords.x - dragOffsetX;
        var dy = coords.y - dragOffsetY;
        moveObject(selectedObject, dx, dy);
        dragOffsetX = coords.x;
        dragOffsetY = coords.y;
        renderAll();
      } else {
        // Hover cursor change
        if (isOverResizeHandle(coords.x, coords.y)) {
          canvasWrapper.classList.remove('cursor-grab');
          canvasWrapper.classList.add('cursor-nwse-resize');
        } else {
          canvasWrapper.classList.remove('cursor-nwse-resize');
          var hit = findObjectAt(coords.x, coords.y);
          if (hit) {
            canvasWrapper.classList.add('cursor-grab');
          } else {
            canvasWrapper.classList.remove('cursor-grab');
          }
        }
      }
      return;
    }

    // --- Drawing preview ---
    if (!isDrawing) return;

    // Re-render all objects then draw preview on top
    renderAll();

    var sw = scaledWidth();
    overlayCtx.strokeStyle = currentColor;
    overlayCtx.lineWidth = sw;
    overlayCtx.lineCap = 'round';
    overlayCtx.lineJoin = 'round';

    if (currentTool === 'arrow') {
      drawArrow(overlayCtx, startX, startY, coords.x, coords.y, sw);
    } else if (currentTool === 'rect') {
      if (fillEnabled && outlineEnabled) {
        overlayCtx.fillStyle = currentColor;
        overlayCtx.fillRect(startX, startY, coords.x - startX, coords.y - startY);
        overlayCtx.beginPath();
        overlayCtx.rect(startX, startY, coords.x - startX, coords.y - startY);
        overlayCtx.stroke();
      } else if (fillEnabled && !outlineEnabled) {
        overlayCtx.fillStyle = currentColor;
        overlayCtx.fillRect(startX, startY, coords.x - startX, coords.y - startY);
      } else if (!fillEnabled && outlineEnabled) {
        overlayCtx.beginPath();
        overlayCtx.rect(startX, startY, coords.x - startX, coords.y - startY);
        overlayCtx.stroke();
      }
    } else if (currentTool === 'ellipse') {
      if (fillEnabled && outlineEnabled) {
        drawEllipseFill(overlayCtx, startX, startY, coords.x, coords.y, currentColor);
        drawEllipse(overlayCtx, startX, startY, coords.x, coords.y);
      } else if (fillEnabled && !outlineEnabled) {
        drawEllipseFill(overlayCtx, startX, startY, coords.x, coords.y, currentColor);
      } else if (!fillEnabled && outlineEnabled) {
        drawEllipse(overlayCtx, startX, startY, coords.x, coords.y);
      }
    } else if (currentTool === 'freehand') {
      freehandPoints.push({ x: coords.x, y: coords.y });
      drawFreehandFromPoints(overlayCtx, freehandPoints);
    } else if (currentTool === 'mosaic') {
      if (currentMosaicShape === 'pen') {
        mosaicPoints.push({ x: coords.x, y: coords.y });
        // Realtime pen mosaic preview
        var bsMap = { 8: 24, 16: 48, 32: 96 };
        var previewBw = bsMap[currentBlockSize] || currentBlockSize * 3;
        var previewObj = { type: 'mosaic', mosaicShape: 'pen', points: mosaicPoints, blockSize: currentBlockSize, brushWidth: previewBw };
        drawPenMosaic(previewObj);
      } else {
        // Draw preview rectangle outline
        overlayCtx.save();
        overlayCtx.strokeStyle = '#3498db';
        overlayCtx.lineWidth = 2;
        overlayCtx.setLineDash([6, 4]);
        overlayCtx.strokeRect(startX, startY, coords.x - startX, coords.y - startY);
        overlayCtx.restore();
      }
    }
  }

  function onPointerUp(e) {
    // --- Select mode ---
    if (currentTool === 'select') {
      if (isResizing) {
        isResizing = false;
        resizeOrigObj = null;
        canvasWrapper.classList.remove('cursor-nwse-resize');
        renderAll();
      }
      if (isDragging) {
        isDragging = false;
        canvasWrapper.classList.remove('cursor-grabbing');
        if (selectedObject) {
          canvasWrapper.classList.add('cursor-grab');
        }
      }
      return;
    }

    if (!isDrawing) return;
    isDrawing = false;

    var coords;
    if (e.clientX !== undefined && e.clientY !== undefined) {
      coords = getCanvasCoords(e);
    } else {
      // mouseleave or touchend without coordinates - use last known position
      coords = { x: startX, y: startY };
    }

    var sw = scaledWidth();

    // Create and store the object
    var obj = null;
    if (currentTool === 'arrow') {
      obj = { type: 'arrow', x1: startX, y1: startY, x2: coords.x, y2: coords.y, color: currentColor, lineWidth: sw, outline: outlineEnabled, selected: false };
    } else if (currentTool === 'rect') {
      obj = { type: 'rect', x1: startX, y1: startY, x2: coords.x, y2: coords.y, color: currentColor, lineWidth: sw, outline: outlineEnabled, filled: fillEnabled, selected: false };
    } else if (currentTool === 'ellipse') {
      obj = { type: 'ellipse', x1: startX, y1: startY, x2: coords.x, y2: coords.y, color: currentColor, lineWidth: sw, outline: outlineEnabled, filled: fillEnabled, selected: false };
    } else if (currentTool === 'freehand') {
      // Deep copy points
      var pts = [];
      for (var i = 0; i < freehandPoints.length; i++) {
        pts.push({ x: freehandPoints[i].x, y: freehandPoints[i].y });
      }
      obj = { type: 'freehand', points: pts, color: currentColor, lineWidth: sw, outline: outlineEnabled, selected: false };
    } else if (currentTool === 'mosaic') {
      if (currentMosaicShape === 'pen') {
        if (mosaicPoints.length > 1) {
          var bsMap = { 8: 24, 16: 48, 32: 96 };
          var penBw = bsMap[currentBlockSize] || currentBlockSize * 3;
          var pts = [];
          for (var pi = 0; pi < mosaicPoints.length; pi++) {
            pts.push({ x: mosaicPoints[pi].x, y: mosaicPoints[pi].y });
          }
          obj = { type: 'mosaic', mosaicShape: 'pen', points: pts, blockSize: currentBlockSize, brushWidth: penBw, lineWidth: 0, selected: false };
        }
        mosaicPoints = [];
      } else {
        var mw = Math.abs(coords.x - startX);
        var mh = Math.abs(coords.y - startY);
        if (mw > 4 && mh > 4) {
          obj = { type: 'mosaic', x1: startX, y1: startY, x2: coords.x, y2: coords.y, blockSize: currentBlockSize, mosaicShape: 'rect', lineWidth: 0, selected: false };
        }
      }
    }

    if (obj) {
      objects.push(obj);
      // 描いた直後に自動選択
      selectObject(obj);
      currentTool = 'select';
      document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
      var selBtn = document.querySelector('.tool-btn[data-tool="select"]');
      if (selBtn) selBtn.classList.add('active');
      updateCursor();
      renderAll();
    }
  }

  // --- Eyedropper ---
  var customColorChip = document.getElementById('customColorChip');

  function pickColor(x, y) {
    // Merge base and overlay to get the composite color
    var tempCanvas = document.createElement('canvas');
    tempCanvas.width = baseCanvas.width;
    tempCanvas.height = baseCanvas.height;
    var tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(baseCanvas, 0, 0);
    tempCtx.drawImage(overlayCanvas, 0, 0);

    var px = Math.round(x);
    var py = Math.round(y);
    px = Math.max(0, Math.min(px, tempCanvas.width - 1));
    py = Math.max(0, Math.min(py, tempCanvas.height - 1));

    var pixel = tempCtx.getImageData(px, py, 1, 1).data;
    var hex = '#' +
      ('0' + pixel[0].toString(16)).slice(-2) +
      ('0' + pixel[1].toString(16)).slice(-2) +
      ('0' + pixel[2].toString(16)).slice(-2);

    // Set as current color
    currentColor = hex;

    // Update color chips: deselect all, show and select custom chip
    document.querySelectorAll('.color-chip').forEach(function(c) { c.classList.remove('active'); });
    customColorChip.style.display = '';
    customColorChip.style.background = hex;
    customColorChip.setAttribute('data-color', hex);
    customColorChip.title = 'カスタム色 (' + hex + ')';
    customColorChip.classList.add('active');

    // Hide loupe and hex label
    if (document.getElementById('annotateLoupe')) {
      document.getElementById('annotateLoupe').style.display = 'none';
    }
    if (document.getElementById('loupeHexLabel')) {
      document.getElementById('loupeHexLabel').style.display = 'none';
    }

    // Switch back to select tool
    document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b) { b.classList.remove('active'); });
    var selectBtn = document.querySelector('.tool-btn[data-tool="select"]');
    if (selectBtn) selectBtn.classList.add('active');
    currentTool = 'select';
    updateCursor();
  }

  // --- Text tool ---
  function showTextInput(e) {
    var rect = overlayCanvas.getBoundingClientRect();
    var displayX = Math.max(0, Math.min(e.clientX - rect.left, rect.width - 150));
    var displayY = Math.max(0, Math.min(e.clientY - rect.top, rect.height - 30));

    textInputEl.style.display = 'block';
    textInputEl.style.left = displayX + 'px';
    textInputEl.style.top = displayY + 'px';

    textField.style.color = currentColor;
    textField.style.fontSize = currentFontSize + 'px';
    textField.value = '';
    textPlaced = false;
    textField.focus();

    textField.onkeydown = function(ev) {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        placeText(displayX, displayY);
      }
      if (ev.key === 'Escape') {
        textInputEl.style.display = 'none';
      }
    };
    textField.onblur = function() {
      setTimeout(function() {
        if (textField.value.trim()) {
          placeText(displayX, displayY);
        } else {
          textInputEl.style.display = 'none';
        }
      }, 100);
    };
  }

  var textPlaced = false;
  function placeText(displayX, displayY) {
    if (textPlaced) return;
    var text = textField.value.trim();
    textInputEl.style.display = 'none';
    textField.onblur = null;
    textField.onkeydown = null;
    if (!text) return;
    textPlaced = true;

    var ratio = overlayCanvas.width / overlayCanvas.getBoundingClientRect().width;
    var cx = displayX * ratio;
    var cy = displayY * ratio;
    var fs = scaledFontSize();

    var obj = {
      type: 'text',
      x1: cx,
      y1: cy,
      text: text,
      color: currentColor,
      fontSize: fs,
      lineWidth: 0,
      outline: outlineEnabled,
      selected: false
    };
    objects.push(obj);
    renderAll();
  }

  // --- Undo ---
  document.getElementById('undoBtn').addEventListener('click', undo);
  function undo() {
    if (objects.length === 0) return;
    objects.pop();
    deselectAll();
    renderAll();
  }

  document.addEventListener('keydown', function(e) {
    // Ignore when text input is focused
    if (document.activeElement === textField) return;

    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      undo();
    }
    // Delete selected object
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedObject) {
      e.preventDefault();
      var idx = objects.indexOf(selectedObject);
      if (idx !== -1) {
        objects.splice(idx, 1);
      }
      selectedObject = null;
      renderAll();
    }
  });

  // --- Clear ---
  document.getElementById('clearBtn').addEventListener('click', function() {
    objects = [];
    selectedObject = null;
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  });

  // --- Save ---
  document.getElementById('saveBtn').addEventListener('click', function() {
    // Deselect before saving so selection box is not in output
    deselectAll();
    renderAll();

    var mergeCanvas = document.createElement('canvas');
    mergeCanvas.width = baseCanvas.width;
    mergeCanvas.height = baseCanvas.height;
    var mergeCtx = mergeCanvas.getContext('2d');
    mergeCtx.drawImage(baseCanvas, 0, 0);
    mergeCtx.drawImage(overlayCanvas, 0, 0);

    // Output size conversion
    var outputSize = document.getElementById('outputSize').value;
    var outputCanvas = mergeCanvas;

    if (outputSize !== 'original') {
      var origW = mergeCanvas.width;
      var origH = mergeCanvas.height;
      var targetW, targetH;

      if (outputSize.indexOf('%') !== -1) {
        var pct = parseInt(outputSize) / 100;
        targetW = Math.round(origW * pct);
        targetH = Math.round(origH * pct);
      } else {
        var parts = outputSize.split('x');
        var maxW = parseInt(parts[0]);
        var maxH = parseInt(parts[1]);
        var scaleW = maxW / origW;
        var scaleH = maxH / origH;
        var scale = Math.min(scaleW, scaleH);
        targetW = Math.round(origW * scale);
        targetH = Math.round(origH * scale);
      }

      if (targetW > 0 && targetH > 0) {
        outputCanvas = document.createElement('canvas');
        outputCanvas.width = targetW;
        outputCanvas.height = targetH;
        var outCtx = outputCanvas.getContext('2d');
        outCtx.drawImage(mergeCanvas, 0, 0, targetW, targetH);
      }
    }

    var link = document.createElement('a');
    link.download = 'annotated_' + Date.now() + '.png';
    link.href = outputCanvas.toDataURL('image/png');
    link.click();
  });

  // --- Reset ---
  document.getElementById('resetBtn').addEventListener('click', function() {
    editorEl.classList.remove('active');
    dropZone.style.display = '';
    objects = [];
    selectedObject = null;
    loadedImage = null;
    fileInput.value = '';
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
  });

  // Initialize cursor
  updateCursor();

  // Initialize cursor
  updateCursor();

})();
</script>

</body>
