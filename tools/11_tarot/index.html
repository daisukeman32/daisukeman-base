<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psyche Telling | ダイスケマンの秘密倉庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#0a0a0f;
  --surface:rgba(20,16,12,0.85);
  --surface2:rgba(30,24,18,0.9);
  --text:#d4c5a0;
  --text2:#8b7355;
  --accent:#c9a84c;
  --accent-dim:rgba(201,168,76,0.3);
  --border:#3d2e1e;
  --border-light:rgba(201,168,76,0.15);
  --glow:rgba(201,168,76,0.4);
  --glow-select:rgba(201,168,76,0.7);
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(61,46,30,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(139,115,85,0.08) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(61,46,30,0.1) 0%, transparent 50%),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(139,115,85,0.02) 2px,
      rgba(139,115,85,0.02) 4px
    );
}

/* Separator */
.separator{
  text-align:center;color:var(--accent);font-family:'Cinzel',serif;
  font-size:14px;letter-spacing:8px;margin:24px 0;opacity:0.6;
  user-select:none;
}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px;border-bottom:1px solid var(--border);
}
header a{
  color:var(--text2);text-decoration:none;font-size:14px;transition:color .2s;
  font-family:'Noto Sans JP',sans-serif;
}
header a:hover{color:var(--accent);}

main{flex:1;display:flex;flex-direction:column;align-items:center;padding:32px 16px;}

h1{
  font-family:'Cinzel',serif;
  font-size:clamp(22px,5vw,36px);font-weight:700;text-align:center;
  margin-bottom:8px;
  color:var(--accent);
  text-shadow:0 0 30px rgba(201,168,76,0.3);
  letter-spacing:3px;
}
.subtitle{
  color:var(--text2);margin-bottom:32px;font-size:14px;text-align:center;
  letter-spacing:2px;
}

.btn{
  background:linear-gradient(135deg,var(--accent),#a08030);
  color:#0a0a0f;border:none;padding:14px 48px;border-radius:4px;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  font-family:'Cinzel','Noto Sans JP',serif;
  text-transform:uppercase;
  text-align:center;
  border:1px solid var(--accent);
  display:inline-flex;align-items:center;justify-content:center;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--glow);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

.btn-secondary{
  background:transparent;border:1px solid var(--accent);color:var(--accent);
  padding:10px 24px;border-radius:4px;font-size:14px;cursor:pointer;
  transition:all .2s;font-family:'Cinzel','Noto Sans JP',serif;
  letter-spacing:1px;
}
.btn-secondary:hover{background:var(--accent);color:#0a0a0f;}

/* Card Grid - diamond pattern */
#cardGrid{
  position:relative;
  width:100%;max-width:1100px;height:600px;margin:24px auto;
}
.tarot-card{
  width:80px;height:120px;border-radius:4px;cursor:pointer;position:absolute;
  perspective:600px;transition:transform .3s, box-shadow .3s, filter .3s;
}
.tarot-card:hover{
  transform:scale(1.12) translateY(-8px) !important;
  z-index:100;
  filter:brightness(1.1);
}
.tarot-card.selected{
  transform:scale(1.15) !important;z-index:101;
}
.tarot-card.selected .card-inner .card-back{
  box-shadow:0 0 20px var(--accent),0 0 50px var(--glow-select),0 0 80px var(--accent-dim);
}
.tarot-card.disabled{pointer-events:none;opacity:.3;filter:grayscale(0.5);}

.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform .8s ease;
}
.tarot-card.flipped .card-inner{transform:rotateY(180deg);}

.card-front,.card-back{
  position:absolute;width:100%;height:100%;border-radius:4px;
  backface-visibility:hidden;overflow:hidden;
}
.card-front{transform:rotateY(180deg);background:var(--surface2);}
.card-front img{width:100%;height:100%;object-fit:cover;border-radius:4px;}
.card-front.reversed img{transform:rotate(180deg);}
.card-back{
  background:var(--surface);
  border:1px solid var(--border);
  box-shadow:
    0 0 8px rgba(201,168,76,0.15),
    inset 0 0 20px rgba(201,168,76,0.05);
}
.card-back img{width:100%;height:100%;object-fit:cover;border-radius:4px;}

.oracle-label{
  text-align:center;margin:24px 0 8px;color:var(--accent);
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:6px;opacity:0.7;
}
.oracle-quote{
  text-align:center;font-size:clamp(14px,2.5vw,18px);font-weight:700;
  color:var(--accent);font-family:'Noto Sans JP',serif;
  letter-spacing:1px;line-height:1.6;
  text-shadow:0 0 20px rgba(201,168,76,0.4);
  white-space:nowrap;
}

/* DIVINE overlay */
.divine-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);
  z-index:500;
  opacity:1;
  transition:opacity 0.5s;
}
.divine-overlay.hidden{
  opacity:0;pointer-events:none;
}
.divine-btn{
  font-size:42px !important;
  padding:28px 80px !important;
  letter-spacing:12px !important;
  animation:divineFloat 2s ease-in-out infinite;
  box-shadow:0 0 60px var(--glow), 0 0 120px rgba(201,168,76,0.2);
}
@keyframes divineFloat{
  0%,100%{transform:translateY(0);box-shadow:0 0 60px var(--glow),0 0 120px rgba(201,168,76,0.2);}
  50%{transform:translateY(-10px);box-shadow:0 0 80px var(--glow),0 0 160px rgba(201,168,76,0.3);}
}

.selection-count{
  color:var(--text2);margin:16px 0;font-size:14px;text-align:center;
  letter-spacing:1px;
}

/* Result */
#result{max-width:720px;width:100%;margin:0 auto;}

.result-header{
  text-align:center;margin:16px 0 8px;
  font-family:'Cinzel','Cinzel',serif;
  color:var(--accent);font-size:clamp(16px,3vw,22px);
  letter-spacing:3px;
  text-shadow:0 0 20px rgba(201,168,76,0.3);
}

/* Individual card result */
.result-card-block{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px;
  margin:20px auto;
  max-width:680px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,168,76,0.1);
  display:flex;
  gap:20px;
  align-items:flex-start;
}
.result-card-block .card-image-wrap{
  flex-shrink:0;width:120px;
}
.result-card-block .card-image-wrap img{
  width:120px;aspect-ratio:2/3;object-fit:cover;border-radius:6px;
  border:1px solid var(--border);
  box-shadow:0 2px 12px rgba(0,0,0,0.5);
}
.result-card-block .card-image-wrap img.reversed{transform:rotate(180deg);}
.result-card-block .card-text{
  flex:1;min-width:0;
}
.result-card-block .card-label{
  font-family:'Cinzel','Cinzel',serif;
  font-size:13px;color:var(--accent);
  letter-spacing:3px;margin-bottom:8px;
}
.result-card-block .card-name{
  font-family:'Cinzel',serif;
  font-size:20px;font-weight:700;color:var(--text);
  margin-bottom:2px;
}
.result-card-block .card-position{
  font-size:13px;color:var(--accent);font-weight:600;margin-bottom:12px;
}
.result-card-block .card-meaning{
  font-size:14px;line-height:1.9;color:var(--text);
  margin-bottom:12px;
}
.result-card-block .card-advice{
  font-size:13px;line-height:1.7;color:var(--accent);
  padding:8px 12px;
  background:rgba(201,168,76,0.08);
  border-left:3px solid var(--accent);
  border-radius:0 4px 4px 0;
}

/* Oracle box (double border) */
.oracle-box{
  max-width:560px;margin:32px auto;text-align:center;
  padding:28px 32px;
  border:2px solid var(--accent);
  outline:1px solid var(--accent);
  outline-offset:4px;
  border-radius:4px;
  background:rgba(201,168,76,0.04);
  box-shadow:0 0 40px rgba(201,168,76,0.1);
}
.oracle-box h3{
  font-family:'Cinzel','Cinzel',serif;
  font-size:18px;color:var(--accent);
  letter-spacing:4px;margin-bottom:16px;
  text-shadow:0 0 15px rgba(201,168,76,0.3);
}
.oracle-box p{
  font-size:16px;line-height:2;color:var(--text);
  font-weight:400;
}

.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0;}

footer{
  text-align:center;padding:24px;font-size:12px;color:var(--text2);
  border-top:1px solid var(--border);
}

/* ===== PUNISHMENT MODE ===== */
body.punish{background:#020002 !important;background-image:none !important;}
body.punish header,
body.punish footer,
body.punish .separator,
body.punish .result-header{opacity:0.06;}
body.punish .actions{opacity:0.3;transition:opacity 0.5s;}
body.punish .actions:hover{opacity:1;}

/* Punish result: death card + text glow from darkness */
body.punish .punish-block{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 20px;
  animation:punishFadeIn 2s ease forwards;
}
@keyframes punishFadeIn{
  0%{opacity:0;}
  100%{opacity:1;}
}
body.punish .punish-death-img{
  width:160px;border-radius:8px;
  transform:rotate(180deg);
  filter:drop-shadow(0 0 40px rgba(120,10,10,0.6)) drop-shadow(0 0 80px rgba(80,0,0,0.3));
  animation:deathPulse 3s ease-in-out infinite;
}
@keyframes deathPulse{
  0%,100%{filter:drop-shadow(0 0 40px rgba(120,10,10,0.6)) drop-shadow(0 0 80px rgba(80,0,0,0.3));}
  50%{filter:drop-shadow(0 0 60px rgba(150,10,10,0.8)) drop-shadow(0 0 100px rgba(100,0,0,0.4));}
}
body.punish .punish-title{
  font-family:'Cinzel',serif;font-size:clamp(20px,5vw,32px);
  color:#8b1a1a;letter-spacing:4px;margin:24px 0 8px;
  text-shadow:0 0 30px rgba(120,10,10,0.5);
}
body.punish .punish-sub{
  font-size:13px;color:#4a1010;letter-spacing:3px;margin-bottom:32px;
  font-family:'Cinzel',serif;
}
body.punish .punish-text{
  max-width:480px;text-align:center;
  font-size:15px;line-height:2.2;
  color:#6b3030;
  animation:textGlow 4s ease-in-out infinite;
}
@keyframes textGlow{
  0%,100%{color:#6b3030;text-shadow:none;}
  50%{color:#7a3535;text-shadow:0 0 20px rgba(120,30,30,0.2);}
}
body.punish .punish-oracle{
  max-width:400px;margin:40px auto;text-align:center;
  padding:24px 28px;
  border:1px solid #3d1010;
  border-radius:4px;
  background:rgba(40,5,5,0.3);
}
body.punish .punish-oracle h3{
  font-family:'Cinzel',serif;font-size:14px;
  color:#6b2020;letter-spacing:4px;margin-bottom:14px;
}
body.punish .punish-oracle p{
  font-size:14px;line-height:2;color:#5a2020;
}
body.punish .punish-quote{
  font-family:'Cinzel',serif;
  font-size:clamp(16px,4vw,24px);
  color:#8b1a1a;letter-spacing:3px;
  margin-top:32px;
  text-shadow:0 0 40px rgba(120,10,10,0.4);
}

.hidden{display:none!important;}

@media(max-width:600px){
  /* スマホ: diamond配置を捨てて、5列grid配置に切り替え */
  #cardGrid{
    height:auto !important;
    min-height:auto;
    display:grid !important;
    grid-template-columns:repeat(5, 1fr) !important;
    gap:8px !important;
    padding:8px;
    margin:16px auto;
  }
  .tarot-card{
    position:static !important;
    width:100% !important;
    height:auto !important;
    aspect-ratio:2/3 !important;
    left:auto !important;
    top:auto !important;
    transform:none !important;
  }
  .tarot-card:hover{
    transform:scale(1.05) !important;
  }
  .tarot-card.selected{
    transform:scale(1.08) !important;
  }
  .result-card-block{
    flex-direction:column;align-items:center;padding:16px;
  }
  .result-card-block .card-image-wrap{width:100px;}
  .result-card-block .card-image-wrap img{width:100px;}
  .result-card-block .card-text{text-align:center;}
  .result-card-block .card-name{font-size:17px;}
  .oracle-box{padding:20px 16px;margin:24px 12px;}
}

@media(max-width:600px){
  /* 余り2枚を中央寄せ(隣接): 5列の列2と列3 */
  #cardGrid .tarot-card:nth-last-child(2){grid-column:2 !important;}
  #cardGrid .tarot-card:nth-last-child(1){grid-column:3 !important;}
}
@media(max-width:400px){
  /* 小さいスマホ: 4列grid */
  #cardGrid{
    grid-template-columns:repeat(4, 1fr) !important;
  }
  /* 4列時の余り2枚: 中央寄せ(隣接) 列2と列3 */
  #cardGrid .tarot-card:nth-last-child(2){grid-column:2 !important;}
  #cardGrid .tarot-card:nth-last-child(1){grid-column:3 !important;}
}
</style>

<script src="../oracle-sounds.js"></script>
<script>
// Tarot Data
const tarot=[
  {id:0,name:'愚者',file:'00_fool.webp',meaning_up:'あたらしい一歩を踏み出すときが来ています。今のあなたには、まだ見ぬ世界に飛び込む勇気があります。周りの目を気にしすぎず、心のおもむくままに進んでみてください。きっと思いがけない出会いや発見が待っています。ここだけは気をつけて：勢いだけで動かず、最低限の準備はしておきましょう。',meaning_rev:'ちょっと立ち止まってみてください。今は見切り発車をすると痛い目にあいやすいときです。「まあいいか」で済ませていることが、あとで大きな問題になるかもしれません。出かける前に持ち物を確認して、スケジュールにも余裕を持たせましょう。ここだけは気をつけて：準備不足が一番のリスクです。',desc:'愚者はすべての始まりを表すカード。何にもしばられない自由なこころと、無限の可能性をあらわしています。',advice_up:'直感を信じろ。迷うな。今この瞬間に踏み出せ',advice_rev:'準備を怠るな。持ち物を確かめ、道を確かめ、それから動け'},
  {id:1,name:'魔術師',file:'01_magician.webp',meaning_up:'あなたの手もとには、必要なものがすべてそろっています。やりたいと思っていたことに取りかかるには絶好のタイミングです。むずかしく考えず、まずは小さく始めてみましょう。あなたの工夫しだいで、状況はどんどん良くなっていきます。ここだけは気をつけて：手を広げすぎず、ひとつずつ集中しましょう。',meaning_rev:'実力はあるのに、うまくいかせていない感覚はありませんか。口だけになっていないか、見栄を張っていないか、ちょっとふり返ってみてください。小さなウソやごまかしが信頼を傷つけることもあります。ここだけは気をつけて：できないことは正直に「できない」と言いましょう。',desc:'魔術師は才能と行動力をあらわすカード。あなたの中にある力を使いこなすときが来ています。',advice_up:'才能はすでにある。あとは使うだけだ。動け',advice_rev:'語るな。実行せよ。言葉より行動で示せ'},
  {id:2,name:'女教皇',file:'02_priestess.webp',meaning_up:'頭で考えるよりも、心で感じることを大切にしてください。「なんとなくこっちがいい」という直感は、今のあなたにとってとても頼りになるものです。あわてて答えを出す必要はありません。静かに自分と向き合う時間をつくりましょう。ここだけは気をつけて：人の意見にふりまわされないようにしましょう。',meaning_rev:'自分の気持ちを押しこめていませんか。「本当はどうしたいの？」と自分にたずねてみてください。まわりに合わせすぎて、大事な直感を見落としているかもしれません。ひとりで静かに過ごす時間をとることをおすすめします。ここだけは気をつけて：感情のフタをしめたままにしないでください。',desc:'女教皇は直感とこころの声をあらわすカード。目に見えない大切なものに気づかせてくれます。',advice_up:'静かにせよ。心の声が聞こえるはずだ',advice_rev:'本音を押し殺すな。それは魂の叫びだ'},
  {id:3,name:'女帝',file:'03_empress.webp',meaning_up:'あなたのまわりには、思っている以上にゆたかなものがあふれています。おいしいものを食べたり、好きな音楽を聴いたり、五感をよろこばせる時間を大切にしましょう。人にやさしくすることで、自分も満たされていきます。ここだけは気をつけて：自分のことも同じくらい大事にしてください。',meaning_rev:'人の面倒を見すぎていませんか。やさしさが「おせっかい」になっていないか確認しましょう。また、ついお金を使いすぎてしまいやすいときでもあります。自分の足で立つことを意識して、甘えすぎにも注意してください。ここだけは気をつけて：ムダづかいをしていないか家計を見直しましょう。',desc:'女帝はゆたかさと愛をあらわすカード。日々のくらしの中にある幸せに気づかせてくれます。',advice_up:'足元を見よ。すでに豊かさに囲まれている',advice_rev:'甘えを断て。己の足で立つ時が来ている'},
  {id:4,name:'皇帝',file:'04_emperor.webp',meaning_up:'今は計画をしっかり立てて、着実に進むときです。「なんとなく」ではなく、きちんと段取りを組んでから動きましょう。まわりの人をまとめたり、リーダー役をまかされることがあるかもしれません。責任感を持って取り組めば、信頼がぐんと高まります。ここだけは気をつけて：スケジュール帳をこまめに確認しましょう。',meaning_rev:'こうあるべき、という思いが強すぎていませんか。正しさを押しつけると、まわりの人が息苦しくなってしまいます。たまにはゆるく構えて、人のやり方も認めてあげてください。がんこになりすぎると、チャンスを逃してしまいます。ここだけは気をつけて：「自分が正しい」と思い込まないようにしましょう。',desc:'皇帝はリーダーシップと安定をあらわすカード。しっかりとした土台をつくることの大切さを教えてくれます。',advice_up:'計画を立てよ。段取りなき行動は無謀と知れ',advice_rev:'頑固を捨てよ。しなやかさこそ真の強さなり'},
  {id:5,name:'教皇',file:'05_hierophant.webp',meaning_up:'迷ったときは、信頼できる人にそうだんしてみましょう。先輩や経験者のアドバイスに、今のあなたに必要なヒントがかくれています。本を読んだり、勉強を始めるにも良いタイミングです。ひとりで抱えこまず、人のちからを借りてください。ここだけは気をつけて：素直にアドバイスを受け入れる心をもちましょう。',meaning_rev:'「こうするものだ」という固定観念にとらわれていませんか。ルールやしきたりも大事ですが、それが今の自分に合っているか見直してみてください。他人の正解があなたの正解とはかぎりません。自分なりの答えを探すことも大切です。ここだけは気をつけて：古いやり方にしがみつかないようにしましょう。',desc:'教皇はまなびと導きをあらわすカード。人とのつながりの中で成長できることを教えてくれます。',advice_up:'ひとりで抱えるな。頼れる者に声をかけよ',advice_rev:'古い常識を疑え。汝の答えは汝の中にある'},
  {id:6,name:'恋人',file:'06_lovers.webp',meaning_up:'大切なえらぶときが来ています。どちらが正しいかではなく、どちらが自分の心に正直かを基準にしてください。人間関係ではお互いを尊重することで、よりよい関係が育まれます。迷ったら、損得ではなく気持ちで決めましょう。ここだけは気をつけて：あいまいな返事で相手をまたせないようにしましょう。',meaning_rev:'決められない、えらべない、という状態がつづいていませんか。優柔不断が関係をこじらせることもあります。また、目先のここちよさに流されると、あとで後悔しやすいときです。本当に大事なものは何か、いちど紙に書き出してみてください。ここだけは気をつけて：甘いさそいには慎重になりましょう。',desc:'恋人はえらびと調和をあらわすカード。自分の気持ちに正直になることの大切さを伝えています。',advice_up:'損得で選ぶな。心が震える方を選べ',advice_rev:'迷いを断て。選ばぬことが最大の損失と知れ'},
  {id:7,name:'戦車',file:'07_chariot.webp',meaning_up:'やると決めたなら、迷わず突き進みましょう。今のあなたには困難を乗りこえる意志の力があります。目標をはっきりさせて、余計なことに気をとられないようにしてください。行動すればするほど、良い結果がついてきます。ここだけは気をつけて：体力をつかうときなので、睡眠と食事はしっかりとりましょう。',meaning_rev:'がむしゃらに走りすぎて、まわりが見えなくなっていませんか。方向を間違えたまま進むと、遠回りになってしまいます。いったん速度を落として、自分がどこに向かっているのか確認しましょう。焦りは禁物です。ここだけは気をつけて：運転や自転車など、移動中の事故に注意しましょう。',desc:'戦車は前進と勝利をあらわすカード。つよい意志で道を切りひらく力を持っています。',advice_up:'前を向け。走れ。振り返るな。勝利は目の前にある',advice_rev:'止まれ。方角を確かめよ。間違った方向への全力は災いとなる'},
  {id:8,name:'力',file:'08_strength.webp',meaning_up:'力ずくでなんとかしようとしなくても大丈夫です。やさしさと根気で、じっくり取り組んでいけば必ずうまくいきます。感情的になりそうなときほど、深呼吸をしてみてください。穏やかな態度がまわりの人の心も動かします。ここだけは気をつけて：怒りをぶつけるのではなく、気持ちをことばで伝えましょう。',meaning_rev:'自信をなくしていたり、イライラが止まらなかったりしていませんか。無理にがんばりつづけると、心も体もパンクしてしまいます。弱音をはくことは恥ずかしいことではありません。信頼できる人に気持ちを話してみてください。ここだけは気をつけて：ストレスをためこまず、こまめに発散しましょう。',desc:'力はうちなる強さと忍耐をあらわすカード。やさしさこそが本当の強さであることを教えてくれます。',advice_up:'力ずくで押すな。やさしさで包め。それが本当の強さだ',advice_rev:'無理をするな。弱さを見せる勇気こそ真の強さなり'},
  {id:9,name:'隠者',file:'09_hermit.webp',meaning_up:'にぎやかな場所からすこし離れて、ひとりの時間を大切にしましょう。自分と向き合うことで、本当にやりたいことが見えてきます。散歩をしたり日記を書いたり、静かな時間を過ごすのがおすすめです。答えは外ではなく、自分の中にあります。ここだけは気をつけて：スマホを置いて、デジタルから離れる時間をつくりましょう。',meaning_rev:'ひとりで抱えこみすぎていませんか。考えすぎて動けなくなっているなら、思い切って誰かに話してみてください。孤立がつづくと、ものの見方がかたよってしまいます。外に出て人と会うだけでも気分がかわりますよ。ここだけは気をつけて：引きこもりすぎず、外の空気を吸いましょう。',desc:'隠者は内省と知恵をあらわすカード。立ち止まることで見えてくるものがあると教えてくれます。',advice_up:'ひとりになれ。静寂の中に答えがある',advice_rev:'殻に閉じこもるな。外に出よ。風を感じよ'},
  {id:10,name:'運命の輪',file:'10_wheel.webp',meaning_up:'流れが大きくかわるタイミングです。チャンスだと感じたら、すぐにつかみにいきましょう。良いことも悪いことも永遠にはつづきません。今の良い波をしっかり活かして、次のステップに進んでください。ここだけは気をつけて：チャンスが来たら「あとで」と言わず、すぐ動きましょう。',meaning_rev:'思うようにいかない時期かもしれません。でも安心してください、この流れはいつまでもつづくわけではありません。今はじっと力をたくわえるときだと思って、焦らずに過ごしましょう。やがて風向きはかわります。ここだけは気をつけて：うまくいかないときこそ、生活リズムを整えましょう。',desc:'運命の輪は変化と転機をあらわすカード。すべてはめぐりめぐっていくことを教えてくれます。',advice_up:'波が来た。乗れ。この瞬間を逃すな',advice_rev:'焦るな。冬のあとには必ず春が来る。耐えよ'},
  {id:11,name:'正義',file:'11_justice.webp',meaning_up:'正直に、まっすぐに行動することが良い結果につながります。ウソやごまかしはすぐに見やぶられるときです。お金のやりとりや契約ごとは、細かいところまで確認しましょう。公平な姿勢が信頼を生みます。ここだけは気をつけて：書類やメールの内容をよく読んでからサインしましょう。',meaning_rev:'「なんだか不公平だな」と感じることがあるかもしれません。でも、自分にも改善できるところがないか、冷静にふり返ってみてください。感情的に動くと判断をあやまりやすいときです。バランスを取り戻すことを意識しましょう。ここだけは気をつけて：感情で決めず、事実をもとに判断しましょう。',desc:'正義は公平と真実をあらわすカード。正しい行いがきちんと報われることを教えてくれます。',advice_up:'嘘をつくな。正直こそ最強の武器と知れ',advice_rev:'感情で動くな。事実を見よ。冷静であれ'},
  {id:12,name:'吊るされた男',file:'12_hanged.webp',meaning_up:'今は動くときではなく、待つときです。じれったいかもしれませんが、この「待ちの時間」が大切な気づきをくれます。いつもとちがう角度からものごとを見てみてください。逆さまに見ることで、新しい発見があるはずです。ここだけは気をつけて：焦って答えを出そうとしないでください。',meaning_rev:'がまんのしすぎで疲れていませんか。自分を犠牲にしてまで人に尽くすのは、そろそろやめてもいいかもしれません。「断る」ことも立派なスキルです。自分の時間やエネルギーを取りもどすことを優先しましょう。ここだけは気をつけて：ムリな頼みごとは断る練習をしましょう。',desc:'吊るされた男は視点の転換をあらわすカード。立ち止まることで見える世界があると教えてくれます。',advice_up:'動くな。待て。逆さから見れば世界は変わる',advice_rev:'犠牲はもうたくさんだ。自分を守れ'},
  {id:13,name:'死神',file:'13_death.webp',meaning_up:'ひとつの章が終わり、あたらしい章が始まろうとしています。使わなくなったもの、合わなくなった習慣は思い切って手放しましょう。クローゼットの整理や部屋のかたづけも効果的です。終わりがあるからこそ、あたらしい始まりがやってきます。ここだけは気をつけて：「もったいない」で持ちつづけないで、いらないものは手放しましょう。',meaning_rev:'変わらなきゃいけないと分かっているのに、なかなか踏み出せないでいませんか。古いものにしがみつくと、あたらしいものが入ってくる余地がなくなります。すこしずつでいいので、変化を受け入れる練習をしてみてください。ここだけは気をつけて：変わることを怖がりすぎないでください。',desc:'死神は終わりと再生をあらわすカード。こわいカードではなく、生まれ変わりのチャンスを意味します。',advice_up:'手放せ。古き衣を脱ぎ捨てよ。新しき自分が待っている',advice_rev:'変化を拒むな。しがみつく手を離せ。その先に光がある'},
  {id:14,name:'節制',file:'14_temperance.webp',meaning_up:'何事もほどほどが一番です。食べすぎ、飲みすぎ、働きすぎ、遊びすぎに注意して、バランスのよい毎日を心がけましょう。あちこちに手を出すよりも、ひとつひとつ丁寧に取り組むことで良い結果につながります。ここだけは気をつけて：夜ふかしをしすぎず、規則正しい生活をしましょう。',meaning_rev:'生活のバランスがくずれていませんか。どちらかに偏りすぎると、体調や気持ちに影響が出やすいときです。極端なダイエットや夜ふかし、衝動買いには要注意。「ちょうどいい」を意識して、ペースを整え直しましょう。ここだけは気をつけて：「もうちょっとだけ」が積もりすぎないようにしましょう。',desc:'節制はバランスと調和をあらわすカード。穏やかに、ていねいに暮らすことの大切さを伝えています。',advice_up:'偏るな。中庸を守れ。それが最も遠くへ行ける道だ',advice_rev:'生活を見直せ。崩れたバランスは今すぐ正せ'},
  {id:15,name:'悪魔',file:'15_devil.webp',meaning_up:'ついつい手が伸びてしまうもの、やめたいのにやめられないことはありませんか。スマホの見すぎ、甘いものの食べすぎ、夜ふかし。小さな習慣がじぶんを縛っていることに気づくチャンスです。今日ひとつだけ、やめてみましょう。ここだけは気をつけて：「自分は大丈夫」という過信がいちばん危ないです。',meaning_rev:'悪い習慣から抜け出す兆しが見えています。「もうこのままじゃいけない」と感じているなら、それは正しい感覚です。いきなり完璧をめざさなくていいので、すこしずつ自分を取りもどしていきましょう。まわりに助けを求めることも大事です。ここだけは気をつけて：ひとりでがんばりすぎず、人の手を借りましょう。',desc:'悪魔は束縛と欲望をあらわすカード。自分をしばっているものに気づくことで、自由になれると教えてくれます。',advice_up:'鎖に気づけ。気づいた瞬間、汝は自由になれる',advice_rev:'光が見えている。一歩ずつでいい。鎖を断ち切れ'},
  {id:16,name:'塔',file:'16_tower.webp',meaning_up:'思いがけない出来事がおこるかもしれません。ショックを受けることもありますが、それは古い考えが壊れて、本当に大切なものが見えてくるプロセスです。備えられることは今のうちに備えておきましょう。ここだけは気をつけて：防災グッズの確認や、大事なデータのバックアップをしておきましょう。',meaning_rev:'「壊れるのが怖い」と変化を避けていませんか。問題を先送りにすると、あとでもっと大きくなって返ってきます。小さなうちに対処しておくことが大切です。怖くても、現実と向き合う勇気を持ちましょう。ここだけは気をつけて：見て見ぬふりをしている問題に、早めに手をつけましょう。',desc:'塔は突然の変化と気づきをあらわすカード。壊れたあとに、本当に大事なものが残ります。',advice_up:'備えよ。崩壊を恐れるな。瓦礫の中に真実が眠っている',advice_rev:'見て見ぬふりをするな。小さな火を放置すれば大火事になる'},
  {id:17,name:'星',file:'17_star.webp',meaning_up:'つらい時期を乗りこえたあなたに、希望の光がさしこんでいます。夢やあこがれを大切にしてください。「どうせ無理」と決めつけずに、やりたいことを口に出してみましょう。あなたを応援してくれる人がきっとあらわれます。ここだけは気をつけて：疲れた心と体をしっかり休ませてあげましょう。',meaning_rev:'希望が持てなくて、気持ちが沈んでいませんか。今は夜のように暗く感じるかもしれませんが、かならず朝は来ます。自分を責めないでください。好きだったことや楽しかったことを思い出して、すこしずつ元気を取りもどしましょう。ここだけは気をつけて：ひとりで抱えこまず、誰かに話を聞いてもらいましょう。',desc:'星は希望といやしをあらわすカード。どんな夜にもかならず光があることを教えてくれます。',advice_up:'顔を上げよ。星が見えるはずだ。希望は消えていない',advice_rev:'闇は永遠ではない。自分を責めるな。夜明けは近い'},
  {id:18,name:'月',file:'18_moon.webp',meaning_up:'なんとなく不安を感じたり、ものごとがはっきりしなかったりするかもしれません。でも、見えないものを怖がりすぎないでください。今は情報をうのみにせず、自分の目で確かめることが大切です。夜の散歩や入浴で気分をリセットしましょう。ここだけは気をつけて：うわさ話やSNSの情報をそのまま信じないようにしましょう。',meaning_rev:'もやもやした気持ちが晴れてくるサインです。心配していたことが思ったほど深刻ではないと気づくかもしれません。直感がさえてくる時期なので、ピンときたことは大事にしてください。すこしずつ霧が晴れていきます。ここだけは気をつけて：考えすぎをやめて、目の前のことに集中しましょう。',desc:'月は不安と幻想をあらわすカード。見えない部分にも目を向けることの大切さを伝えています。',advice_up:'惑わされるな。うわさに耳を貸すな。己の目で確かめよ',advice_rev:'霧が晴れてきた。直感を信じろ。もう迷うな'},
  {id:19,name:'太陽',file:'19_sun.webp',meaning_up:'とても良い流れが来ています。やること成すことがうまくいきやすいときです。明るい気持ちで過ごしましょう。外に出て日光を浴びたり、人と会ったりすることで、さらに運気が上がります。素直によろこびを表現してください。ここだけは気をつけて：調子が良いときほど、感謝の気持ちを忘れずにいましょう。',meaning_rev:'良い流れのなかにも、すこし影がさしているかもしれません。自信過剰になったり、浮かれすぎたりすると足もとをすくわれます。うまくいっているときこそ謙虚に、地に足をつけて過ごしましょう。基本的には良い運気です。ここだけは気をつけて：うまくいっているときこそ、油断しないようにしましょう。',desc:'太陽はよろこびと成功をあらわすカード。あなたの毎日を明るく照らしてくれるカードです。',advice_up:'最高の時だ。この光を全身で浴びよ。感謝を忘れるな',advice_rev:'浮かれるな。好調な時ほど足元を見よ。謙虚であれ'},
  {id:20,name:'審判',file:'20_judgement.webp',meaning_up:'あたらしい自分に生まれ変わるときが来ています。過去のあやまちを反省し、きちんと清算しましょう。ずっと気になっていた連絡、謝りたかった相手、やり残したこと。今こそ行動にうつすときです。すっきりした気持ちで次のステージへ進めます。ここだけは気をつけて：先のばしにしていたことを、今日ひとつ片づけましょう。',meaning_rev:'過去のことをいつまでも引きずっていませんか。自分を許すこと、人を許すことが、前に進むためのカギです。「あのときこうしていれば」と考えるのはもうやめましょう。過去は変えられませんが、これからの行動は変えられます。ここだけは気をつけて：自分を責めすぎないでください。',desc:'審判は再生と目覚めをあらわすカード。自分を見つめ直し、あたらしく歩き出す力をくれます。',advice_up:'過去を清算せよ。生まれ変わる時が来た。目を覚ませ',advice_rev:'過去を許せ。自分を許せ。前を向け。もう振り返るな'},
  {id:21,name:'世界',file:'21_world.webp',meaning_up:'おめでとうございます。ひとつの大きな流れが完成をむかえようとしています。これまでの努力がかたちになるときです。達成感をしっかり味わって、自分をほめてあげてください。そして次のステージへの扉がもう開き始めています。ここだけは気をつけて：ゴールしたあとも、次の目標を見つけておきましょう。',meaning_rev:'あとすこしで完成なのに、最後のひと押しが足りないと感じていませんか。諦めるのはまだ早いです。やり残したことがあるなら、ひとつずつ片づけていきましょう。完璧でなくてもいいので、まずは仕上げることを優先してください。ここだけは気をつけて：途中で投げ出さず、最後までやりきりましょう。',desc:'世界は完成と達成をあらわすカード。すべてがひとつにまとまり、あたらしい旅が始まることを意味します。',advice_up:'やり遂げた。胸を張れ。そして次の扉を開け',advice_rev:'投げ出すな。あと一歩だ。最後まで走り切れ'}
];

// State
let selected=[];
let deck=[];
let readings=[];

const startScreen=document.getElementById('startScreen');
const selectScreen=document.getElementById('selectScreen');
const resultScreen=document.getElementById('resultScreen');
const cardGrid=document.getElementById('cardGrid');
const selCount=document.getElementById('selCount');
const readBtn=document.getElementById('readBtn');
const shuffleBtn=document.getElementById('shuffleBtn');
const retryBtn=document.getElementById('retryBtn');

// Shuffle
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

shuffleBtn.onclick=()=>{
  selected=[];
  deck=shuffle(tarot);
  startScreen.classList.add('hidden');
  selectScreen.classList.remove('hidden');
  resultScreen.classList.add('hidden');
  document.getElementById('divineOverlay').classList.add('hidden');
  OracleSound.transition();
  renderGrid();
};

function renderGrid(){
  cardGrid.innerHTML='';
  selCount.textContent='\u9078\u629e: 0 / 3';
  const gridW = cardGrid.offsetWidth || 1100;
  const gridH = cardGrid.offsetHeight || 600;
  const cardW = 80, cardH = 120;

  // 横ワイド菱形: 3,5,7,5,2 = 22枚
  const rows = [
    {count:3},{count:5},{count:7},{count:5},{count:2}
  ];
  const rowH = 130;
  const colW = 120;
  const totalH = rows.length * rowH;
  const startY = (gridH - totalH) / 2;

  // 最終位置を計算
  var positions = [];
  var cardIdx = 0;
  for (var r = 0; r < rows.length; r++) {
    var row = rows[r];
    var rowWidth = row.count * colW;
    var startX = (gridW - rowWidth) / 2;
    for (var c = 0; c < row.count && cardIdx < deck.length; c++) {
      positions.push({
        x: startX + c * colW + (colW - cardW) / 2,
        y: startY + r * rowH
      });
      cardIdx++;
    }
  }

  // カードを中央に重ねて配置（初期位置）
  var centerX = gridW / 2 - cardW / 2;
  var centerY = gridH / 2 - cardH / 2;
  var els = [];

  for (var i = 0; i < deck.length; i++) {
    var card = deck[i];
    var idx = i;
    var el = document.createElement('div');
    el.className = 'tarot-card';
    el.innerHTML = '<div class="card-inner"><div class="card-front"><img src="img/' + card.file + '" alt="' + card.name + '"></div><div class="card-back"><img src="img/back.webp" alt="裏面"></div></div>';
    el.style.left = centerX + 'px';
    el.style.top = centerY + 'px';
    el.style.transform = 'rotate(' + ((Math.random() - 0.5) * 40) + 'deg) scale(0.8)';
    el.style.opacity = '0.6';
    el.style.zIndex = i;
    el.style.transition = 'left 0.8s ease, top 0.8s ease, transform 0.8s ease, opacity 0.5s ease';
    el.onclick = (function(e, ii){ return function(){ toggleSelect(e, ii); }; })(el, idx);
    cardGrid.appendChild(el);
    els.push(el);
  }

  // シャッフルアニメ: ランダムに散らばる
  setTimeout(function(){
    els.forEach(function(el){
      el.style.left = (Math.random() * (gridW - cardW)) + 'px';
      el.style.top = (Math.random() * (gridH - cardH)) + 'px';
      el.style.transform = 'rotate(' + ((Math.random() - 0.5) * 60) + 'deg)';
      el.style.opacity = '0.8';
    });
  }, 50);

  // 菱形に整列
  setTimeout(function(){
    els.forEach(function(el, i){
      if (positions[i]) {
        el.style.left = positions[i].x + 'px';
        el.style.top = positions[i].y + 'px';
        el.style.transform = 'rotate(0deg) scale(1)';
        el.style.opacity = '1';
      }
    });
  }, 900);
}

// Speed check: track selection timestamps
var selectTimes = [];
var isCareless = false;

function toggleSelect(el,idx){
  if(el.classList.contains('selected')){
    el.classList.remove('selected');
    selected=selected.filter(s=>s!==idx);
    selectTimes.pop();
  }else{
    if(selected.length>=3)return;
    el.classList.add('selected');
    el.classList.remove('wobble');
    selected.push(idx);
    selectTimes.push(Date.now());
    OracleSound.select();
  }
  selCount.textContent=`\u9078\u629e: ${selected.length} / 3`;
  if(selected.length===3){
    // Check if all 3 selected within 1.5 seconds (only triggers on rapid careless tapping)
    var elapsed = selectTimes[2] - selectTimes[0];
    isCareless = elapsed < 1500;
    document.getElementById('divineOverlay').classList.remove('hidden');
    document.querySelectorAll('.tarot-card:not(.selected)').forEach(c=>c.classList.add('disabled'));
  }else{
    isCareless = false;
    document.getElementById('divineOverlay').classList.add('hidden');
    document.querySelectorAll('.tarot-card.disabled').forEach(c=>c.classList.remove('disabled'));
  }
}

// Death card data for careless users
var deathCard = tarot.find(function(c){ return c.id === 13; });

readBtn.onclick=()=>{
  OracleSound.divine();

  if(isCareless){
    // Punishment: all 3 cards become Death (reversed)
    readings = [
      {...deathCard, reversed:true},
      {...deathCard, reversed:true},
      {...deathCard, reversed:true}
    ];
    // No visual effects - just the result speaks for itself
  } else {
    readings=selected.map(idx=>{
      const card=deck[idx];
      const reversed=Math.random()<0.5;
      return{...card,reversed};
    });
  }

  // Flip animation
  const cards=document.querySelectorAll('.tarot-card.selected');
  let flipped=0;
  cards.forEach((c,i)=>{
    // If careless, swap card image to death
    if(isCareless){
      var front = c.querySelector('.card-front img');
      if(front) front.src = 'img/13_death.png';
      c.querySelector('.card-front').classList.add('reversed');
    } else if(readings[i].reversed){
      c.querySelector('.card-front').classList.add('reversed');
    }
    setTimeout(()=>{
      c.classList.add('flipped');
      OracleSound.flip();
      flipped++;
      if(flipped===3){OracleSound.reveal();setTimeout(showResult,600);}
    },i*600);
  });
  document.getElementById('divineOverlay').classList.add('hidden');
};

const posLabels=['Past','Present','Future'];
const posLabelsJa=['\u904e\u53bb','\u73fe\u5728','\u672a\u6765'];

function generateOracle(readings){
  const past = readings[0];
  const present = readings[1];
  const future = readings[2];

  // 神託パーツ
  const openings = [
    '星々の導きが告げている。',
    'カードは語る。',
    '運命の糸が紡ぐ言葉を聞け。',
    '闇の中にひとすじの光が見える。',
    'カードは嘘をつかない。'
  ];

  const pastMsg = past.reversed ? past.advice_rev : past.advice_up;
  const presentMsg = present.reversed ? present.advice_rev : present.advice_up;
  const futureMsg = future.reversed ? future.advice_rev : future.advice_up;

  // 逆位置の数で全体のトーンを決める
  const revCount = readings.filter(r => r.reversed).length;

  let body = '';
  if (revCount >= 2) {
    body = '今は試練の時。しかし試練なくして成長はない。' + pastMsg + '。' + presentMsg + '。そして' + futureMsg + '。覚悟を決めよ。道は険しくとも、その先に光がある。';
  } else if (revCount === 1) {
    body = '順風の中にひとつ影がある。' + pastMsg + '。' + presentMsg + '。されど' + futureMsg + '。油断するな。足元を見よ。一歩一歩、確かめながら進め。';
  } else {
    body = '風は汝の味方である。' + pastMsg + '。' + presentMsg + '。そして' + futureMsg + '。迷うな。今こそ動く時。この流れに乗れ。';
  }

  // 最後の格言（未来のカードのadvice全文を使う）
  const futureAdvice = future.reversed ? future.advice_rev : future.advice_up;

  const opening = openings[Math.floor(Math.random() * openings.length)];
  return opening + body + '\n\n── 汝への言葉 ──\n\n『' + futureAdvice + '』';
}

function showResult(){
  selectScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');

  const rc=document.getElementById('resultCards');
  rc.innerHTML='';

  if(isCareless){
    // Darken everything
    document.body.classList.add('punish');

    // Minimal, dark result
    rc.innerHTML = '';
    var oracleBox = document.getElementById('oracleBox');
    oracleBox.innerHTML = '';

    // Random creepy closing line
    var curses = [
      '本日ハ頭上ニ注意セヨ',
      '背後ヲ振リ返ルナ',
      '今夜、鏡ヲ見ルナ',
      '占イヲ舐メルナ',
      '汝ノ影ガ笑ッテイル',
      '今夜ハ窓ヲ開ケルナ',
      '午前3時ニ目ガ覚メル',
      '汝ノ名前ヲ知ッテイル',
      '次ハナイト思エ'
    ];
    var curse = curses[Math.floor(Math.random() * curses.length)];

    var punishDiv = document.createElement('div');
    punishDiv.className = 'punish-block';
    punishDiv.innerHTML =
      '<img class="punish-death-img" src="img/13_death.png" alt="Death">' +
      '<div class="punish-title">Death</div>' +
      '<div class="punish-sub">Reversed</div>' +
      '<div class="punish-text">' +
        '汝ハカードヲ選ンデイナイ。<br>' +
        '何モ考エズニ引イタダケダ。<br><br>' +
        '心ヲ込メズニ引イタカードニ、<br>' +
        '真実ガ宿ルハズガナイ。<br><br>' +
        '占イトハ、自分ノ内面ト向キ合ウ行為デアル。<br>' +
        'ソレヲ軽ンジタ者ニ、星々ハ沈黙ヲモッテ応エル。' +
      '</div>' +
      '<div class="punish-oracle">' +
        '<h3>** 神託拒否 **</h3>' +
        '<p>汝ニ告ゲル言葉ハナイ。<br>心ナキ者ニ神託ハ下ラヌ。<br><br>真ニ知リタイ事ガアルナラバ、<br>モウ一度、一枚一枚ニ<br>想イヲ込メテ選ベ。</p>' +
      '</div>' +
      '<div class="punish-quote">『' + curse + '』</div>';
    rc.appendChild(punishDiv);

    // Share
    var text = encodeURIComponent('タロット占いを適当にやったら死神が出て怒られた... #PsycheTelling ダイスケマンの秘密倉庫で占ってみて');
    var url = encodeURIComponent(location.href);
    document.getElementById('shareBtn').href = 'https://x.com/intent/tweet?text=' + text + '&url=' + url;

    resultScreen.scrollIntoView({behavior:'smooth',block:'start'});
    return;
  }

  readings.forEach((r,i)=>{
    const meaning = r.reversed ? r.meaning_rev : r.meaning_up;
    const advice = r.reversed ? r.advice_rev : r.advice_up;
    const div=document.createElement('div');
    div.className='result-card-block';
    div.innerHTML=`
      <div class="card-image-wrap">
        <img src="img/${r.file}" alt="${r.name}" class="${r.reversed?'reversed':''}">
      </div>
      <div class="card-text">
        <div class="card-label">** ${posLabelsJa[i]}のカード **</div>
        <div class="card-name">${r.name}</div>
        <div class="card-position">${r.reversed?'逆位置':'正位置'}</div>
        <div class="card-meaning">${meaning.replace(/。/g,'。<br>')}</div>
        <div class="card-advice">${advice.replace(/。/g,'。<br>').replace(/。<br>$/,'。')}</div>
      </div>
    `;
    rc.appendChild(div);
  });

  // Oracle
  const oracle = generateOracle(readings);
  var oracleBox=document.getElementById('oracleBox');
  var oParts = oracle.split("\n\n── 汝への言葉 ──\n\n");
  var oBody = oParts[0].replace(/。/g,"。<br>");
  var oQuote = oParts[1] || "";
  oracleBox.innerHTML = '<div class="oracle-box"><h3>** 今日のお告げ **</h3><p>' + oBody + '</p><div class="oracle-label">── 汝への言葉 ──</div><div class="oracle-quote">' + oQuote + '</div></div>';

  // Share
  var names=readings.map(r=>`${r.name}(${r.reversed?'逆':'正'})`).join('\u30FB');
  var text=encodeURIComponent(`タロット占いの結果は「${readings[0].name}」「${readings[1].name}」「${readings[2].name}」でした。今日のお告げ：${oracle} ダイスケマンの秘密倉庫で占ってみて`);
  var url=encodeURIComponent(location.href);
  document.getElementById('shareBtn').href=`https://x.com/intent/tweet?text=${text}&url=${url}`;

  // Scroll to top of result
  resultScreen.scrollIntoView({behavior:'smooth',block:'start'});
}

retryBtn.onclick=()=>{
  resultScreen.classList.add('hidden');
  startScreen.classList.remove('hidden');
  selectTimes = [];
  isCareless = false;
  document.body.classList.remove('punish');
};
