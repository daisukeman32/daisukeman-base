<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF結合 — 複数のPDFを1つにまとめる</title>
<meta name="description" content="複数のPDFファイルを選択して1つに結合するツール。ファイルはブラウザ内で処理され、サーバーには送信されません。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #060606;
  --bg-secondary: #0f0f0f;
  --text-primary: #eee;
  --text-sub: #9a9a9a;
  --border: #181818;
  --btn-bg: #fff;
  --btn-text: #000;
  --input-bg: #0a0a0a;
  --drop-bg: #0a0a0a;
  --drop-border: #333;
  --drop-hover-border: #555;
  --card-bg: #0d0d0d;
  --card-border: #1a1a1a;
  --drag-highlight: #222;
  --danger: #c44;
  --danger-hover: #e55;
}

[data-theme="light"] {
  --bg-primary: #f5f3f0;
  --bg-secondary: #fff;
  --text-primary: #1a1a1a;
  --text-sub: #666;
  --border: #e0ddd8;
  --btn-bg: #1a1a1a;
  --btn-text: #fff;
  --input-bg: #fff;
  --drop-bg: #fff;
  --drop-border: #ccc;
  --drop-hover-border: #999;
  --card-bg: #fff;
  --card-border: #e0ddd8;
  --drag-highlight: #eee;
  --danger: #c44;
  --danger-hover: #e55;
}

body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

a { color: var(--text-sub); text-decoration: none; }
a:hover { color: var(--text-primary); }

.container {
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
  padding: 0 20px;
}

/* Nav */
nav {
  padding: 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav a { font-size: 0.85rem; }

.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-sub);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
  transition: color 0.3s, border-color 0.3s;
}
.theme-toggle:hover { color: var(--text-primary); border-color: var(--text-sub); }

/* Header */
header {
  text-align: center;
  padding: 40px 0 10px;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

header p {
  color: var(--text-sub);
  font-size: 0.9rem;
}

/* Drop zone */
.drop-zone {
  margin-top: 32px;
  border: 2px dashed var(--drop-border);
  border-radius: 12px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  background: var(--drop-bg);
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--drop-hover-border);
  background: var(--drag-highlight);
}

.drop-zone-text {
  color: var(--text-sub);
  font-size: 0.9rem;
  line-height: 1.7;
}

.drop-zone-text strong {
  color: var(--text-primary);
  display: block;
  font-size: 1rem;
  margin-bottom: 4px;
}

.drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

/* File list */
.file-list {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.file-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 12px 14px;
  cursor: grab;
  transition: background 0.15s, border-color 0.15s, opacity 0.15s, transform 0.15s;
  user-select: none;
}

.file-card:active { cursor: grabbing; }

.file-card.dragging {
  opacity: 0.4;
}

.file-card.drag-over {
  border-color: var(--text-sub);
  background: var(--drag-highlight);
}

.file-card .drag-handle {
  color: var(--text-sub);
  font-size: 1rem;
  flex-shrink: 0;
  line-height: 1;
  letter-spacing: 1px;
}

.file-card .file-info {
  flex: 1;
  min-width: 0;
}

.file-card .file-name {
  font-size: 0.85rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-card .file-pages {
  font-size: 0.75rem;
  color: var(--text-sub);
  margin-top: 2px;
}

.file-card .remove-btn {
  background: none;
  border: none;
  color: var(--text-sub);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px 8px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
  line-height: 1;
}

.file-card .remove-btn:hover {
  color: var(--danger-hover);
  background: rgba(200, 60, 60, 0.1);
}

/* Summary & action */
.actions {
  margin-top: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.summary {
  font-size: 0.8rem;
  color: var(--text-sub);
}

.merge-btn {
  background: var(--btn-bg);
  color: var(--btn-text);
  border: none;
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.merge-btn:hover { opacity: 0.85; }
.merge-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Status */
.status {
  margin-top: 16px;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-sub);
  min-height: 1.2em;
}

.status.error { color: var(--danger); }

/* Footer */
footer {
  margin-top: auto;
  padding: 40px 0 24px;
  text-align: center;
}

footer p {
  font-size: 0.75rem;
  color: var(--text-sub);
}

/* Hidden utility */
.hidden { display: none !important; }

/* Responsive */
@media (max-width: 480px) {
  header h1 { font-size: 1.4rem; }
  .drop-zone { padding: 36px 16px; }
  .actions { flex-direction: column; align-items: stretch; text-align: center; }
  .merge-btn { width: 100%; }
}
</style>
<!-- Cloudflare Web Analytics --><script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "d24f1023bf20452ab2732d4e254a2cfd"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
<div class="container">
  <nav>
    <a href="../">&larr; 秘密倉庫に戻る</a>
    <button class="theme-toggle" id="themeToggle">Light</button>
  </nav>

  <header>
    <h1>PDF結合</h1>
    <p>複数のPDFを1つにまとめる</p>
  </header>

  <main>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" multiple>
      <div class="drop-zone-text">
        <strong>PDFファイルをドロップ</strong>
        またはクリックして選択
      </div>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="actions hidden" id="actions">
      <span class="summary" id="summary"></span>
      <button class="merge-btn" id="mergeBtn">結合してダウンロード</button>
    </div>

    <div class="status" id="status"></div>
  </main>
</div>

<footer>
  <div class="container">
    <p>ファイルはブラウザ内で処理されます。サーバーへのアップロードは行いません。</p>
  </div>
</footer>

<script>
(function() {
  'use strict';

  // --- Theme ---
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('pdf-merge-theme') || 'dark';

  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeToggle.textContent = 'Dark';
    } else {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.textContent = 'Light';
    }
    localStorage.setItem('pdf-merge-theme', theme);
  }

  applyTheme(savedTheme);

  themeToggle.addEventListener('click', function() {
    const current = document.documentElement.hasAttribute('data-theme') ? 'dark' : 'light';
    applyTheme(current);
  });

  // --- State ---
  let pdfFiles = []; // { file: File, name: string, pages: number, bytes: Uint8Array }

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const actions = document.getElementById('actions');
  const summary = document.getElementById('summary');
  const mergeBtn = document.getElementById('mergeBtn');
  const status = document.getElementById('status');

  // --- Drop zone ---
  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (files.length === 0) {
      showStatus('PDFファイルを選択してください', true);
      return;
    }
    addFiles(files);
  });

  fileInput.addEventListener('change', function() {
    if (fileInput.files.length > 0) {
      addFiles(Array.from(fileInput.files));
    }
    fileInput.value = '';
  });

  // --- Add files ---
  async function addFiles(files) {
    showStatus('読み込み中...');
    for (const file of files) {
      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
        const pages = doc.getPageCount();
        pdfFiles.push({ file: file, name: file.name, pages: pages, bytes: bytes });
      } catch (err) {
        showStatus(file.name + ' の読み込みに失敗しました', true);
        console.error(err);
      }
    }
    showStatus('');
    renderList();
  }

  // --- Render list ---
  function renderList() {
    fileList.innerHTML = '';

    if (pdfFiles.length === 0) {
      actions.classList.add('hidden');
      return;
    }

    actions.classList.remove('hidden');
    let totalPages = 0;

    pdfFiles.forEach(function(item, index) {
      totalPages += item.pages;

      const card = document.createElement('div');
      card.className = 'file-card';
      card.setAttribute('draggable', 'true');
      card.dataset.index = index;

      card.innerHTML =
        '<span class="drag-handle">::</span>' +
        '<div class="file-info">' +
          '<div class="file-name">' + escapeHtml(item.name) + '</div>' +
          '<div class="file-pages">' + item.pages + ' ページ</div>' +
        '</div>' +
        '<button class="remove-btn" title="削除">&times;</button>';

      // Remove
      card.querySelector('.remove-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        pdfFiles.splice(index, 1);
        renderList();
      });

      // Drag reorder
      card.addEventListener('dragstart', function(e) {
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index.toString());
      });

      card.addEventListener('dragend', function() {
        card.classList.remove('dragging');
        document.querySelectorAll('.file-card.drag-over').forEach(function(el) {
          el.classList.remove('drag-over');
        });
      });

      card.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        card.classList.add('drag-over');
      });

      card.addEventListener('dragleave', function() {
        card.classList.remove('drag-over');
      });

      card.addEventListener('drop', function(e) {
        e.preventDefault();
        e.stopPropagation();
        card.classList.remove('drag-over');
        const fromIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
        const toIndex = index;
        if (fromIndex !== toIndex) {
          const moved = pdfFiles.splice(fromIndex, 1)[0];
          pdfFiles.splice(toIndex, 0, moved);
          renderList();
        }
      });

      fileList.appendChild(card);
    });

    summary.textContent = pdfFiles.length + ' ファイル / ' + totalPages + ' ページ';
    mergeBtn.disabled = false;
  }

  // --- Merge ---
  mergeBtn.addEventListener('click', async function() {
    if (pdfFiles.length === 0) return;

    mergeBtn.disabled = true;
    showStatus('結合中...');

    try {
      const merged = await PDFLib.PDFDocument.create();

      for (const item of pdfFiles) {
        const src = await PDFLib.PDFDocument.load(item.bytes, { ignoreEncryption: true });
        const pages = await merged.copyPages(src, src.getPageIndices());
        pages.forEach(function(page) {
          merged.addPage(page);
        });
      }

      const pdfBytes = await merged.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'merged.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showStatus('結合完了 - ダウンロードが開始されました');
    } catch (err) {
      showStatus('結合に失敗しました: ' + err.message, true);
      console.error(err);
    }

    mergeBtn.disabled = false;
  });

  // --- Helpers ---
  function showStatus(msg, isError) {
    status.textContent = msg;
    status.className = 'status' + (isError ? ' error' : '');
  }

  function escapeHtml(text) {
    var d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
