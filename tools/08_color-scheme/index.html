<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Scheme Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font-main: 'Inter', 'Noto Sans JP', sans-serif;
  --bg: #060606;
  --bg-card: #0f0f0f;
  --text: #eee;
  --text-sub: #9a9a9a;
  --border: #181818;
  --btn-bg: #fff;
  --btn-text: #000;
  --input-bg: #111;
}

[data-theme="light"] {
  --bg: #f5f3f0;
  --bg-card: #fff;
  --text: #1a1a1a;
  --text-sub: #666;
  --border: #ddd;
  --btn-bg: #1a1a1a;
  --btn-text: #fff;
  --input-bg: #fff;
}

html {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
}

body {
  min-height: 100dvh;
  background: var(--bg);
  transition: background 0.3s, color 0.3s;
}

/* Nav */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  z-index: 100;
  background: var(--bg);
}

.nav a {
  color: var(--text-sub);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}

.nav a:hover { color: var(--text); }

.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-sub);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-main);
  transition: all 0.2s;
}

.theme-toggle:hover {
  color: var(--text);
  border-color: var(--text-sub);
}

/* Main */
.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 80px 20px 60px;
}

h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.subtitle {
  color: var(--text-sub);
  font-size: 13px;
  margin-bottom: 32px;
}

/* Input area */
.input-area {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 36px;
  flex-wrap: wrap;
}

.color-picker-wrap {
  position: relative;
  width: 48px;
  height: 48px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
}

.color-picker-wrap input[type="color"] {
  position: absolute;
  inset: -4px;
  width: calc(100% + 8px);
  height: calc(100% + 8px);
  border: none;
  cursor: pointer;
  background: none;
}

.color-picker-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker-wrap input[type="color"]::-webkit-color-swatch { border: none; }

.hex-input {
  font-family: 'Inter', monospace;
  font-size: 16px;
  font-weight: 600;
  background: var(--input-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 8px;
  width: 140px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  transition: border-color 0.2s;
}

.hex-input:focus {
  outline: none;
  border-color: var(--text-sub);
}

.btn {
  font-family: var(--font-main);
  font-size: 13px;
  font-weight: 600;
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: var(--btn-bg);
  color: var(--btn-text);
  transition: opacity 0.2s;
  white-space: nowrap;
}

.btn:hover { opacity: 0.8; }

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-sub);
}

.btn-outline:hover {
  color: var(--text);
  border-color: var(--text-sub);
  opacity: 1;
}

/* Schemes */
.scheme-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
  transition: background 0.3s, border-color 0.3s;
}

.scheme-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.scheme-desc {
  font-size: 12px;
  color: var(--text-sub);
  margin-bottom: 16px;
  opacity: 0.7;
}

.swatches {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: transform 0.15s;
}

.swatch:hover { transform: translateY(-2px); }

.swatch-color {
  width: 56px;
  height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(128,128,128,0.15);
  position: relative;
}

.swatch-color::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  background: rgba(255,255,255,0.15);
  transition: opacity 0.15s;
}

.swatch:hover .swatch-color::after { opacity: 1; }

.swatch-hex {
  font-size: 11px;
  font-family: 'Inter', monospace;
  color: var(--text-sub);
  letter-spacing: 0.02em;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--btn-bg);
  color: var(--btn-text);
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 200;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Export area */
.export-area {
  margin-top: 8px;
  margin-bottom: 24px;
  display: flex;
  justify-content: flex-end;
}

/* Footer */
footer {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-sub);
  font-size: 12px;
  opacity: 0.6;
}

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 72px 16px 40px; }
  .input-area { gap: 8px; }
  .hex-input { width: 110px; font-size: 14px; padding: 10px 12px; }
  .btn { padding: 10px 14px; font-size: 12px; }
  .swatch-color { width: 44px; height: 44px; }
  .swatch-hex { font-size: 10px; }
  .scheme-card { padding: 18px; }
  h1 { font-size: 18px; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="../">&larr; 秘密倉庫に戻る</a>
  <button class="theme-toggle" id="themeToggle">Light</button>
</nav>

<div class="container">
  <h1>Color Scheme Generator</h1>
  <p class="subtitle">メインカラーを選ぶと、色彩理論に基づく配色パターンを提案します</p>

  <div class="input-area">
    <div class="color-picker-wrap">
      <input type="color" id="colorPicker" value="#3a7bd5">
    </div>
    <input type="text" class="hex-input" id="hexInput" value="#3A7BD5" maxlength="7" spellcheck="false">
    <button class="btn" id="randomBtn">Random</button>
  </div>

  <div class="export-area">
    <button class="btn btn-outline" id="exportBtn">CSS変数としてコピー</button>
  </div>

  <div id="schemes"></div>
</div>

<footer>配色は色彩理論（HSL色空間）に基づいて生成しています。</footer>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // --- Color conversion ---
  function hexToRgb(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    const n = parseInt(hex, 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(v => {
      const h = Math.round(Math.min(255, Math.max(0, v))).toString(16);
      return h.length === 1 ? '0' + h : h;
    }).join('');
  }

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) {
      h = s = 0;
    } else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
        case g: h = ((b - r) / d + 2) / 6; break;
        case b: h = ((r - g) / d + 4) / 6; break;
      }
    }
    return [h * 360, s * 100, l * 100];
  }

  function hslToRgb(h, s, l) {
    h = ((h % 360) + 360) % 360;
    s /= 100; l /= 100;
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const x = c * (1 - Math.abs((h / 60) % 2 - 1));
    const m = l - c / 2;
    let r, g, b;
    if (h < 60)       { r = c; g = x; b = 0; }
    else if (h < 120) { r = x; g = c; b = 0; }
    else if (h < 180) { r = 0; g = c; b = x; }
    else if (h < 240) { r = 0; g = x; b = c; }
    else if (h < 300) { r = x; g = 0; b = c; }
    else              { r = c; g = 0; b = x; }
    return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
  }

  function hslToHex(h, s, l) {
    const [r, g, b] = hslToRgb(h, s, l);
    return rgbToHex(r, g, b);
  }

  // --- Scheme generators ---
  function getSchemes(hex) {
    const [r, g, b] = hexToRgb(hex);
    const [h, s, l] = rgbToHsl(r, g, b);

    return [
      {
        name: 'Complementary',
        desc: '補色 -- 色相環の反対側',
        colors: [
          { hex: hslToHex(h, s, l), label: 'Base' },
          { hex: hslToHex(h + 180, s, l), label: 'Complement' }
        ]
      },
      {
        name: 'Analogous',
        desc: '類似色 -- 隣り合う3色',
        colors: [
          { hex: hslToHex(h - 30, s, l), label: '-30\u00b0' },
          { hex: hslToHex(h, s, l), label: 'Base' },
          { hex: hslToHex(h + 30, s, l), label: '+30\u00b0' }
        ]
      },
      {
        name: 'Triadic',
        desc: '\u30c8\u30e9\u30a4\u30a2\u30c9 -- 120\u00b0\u9593\u9694\u306e3\u8272',
        colors: [
          { hex: hslToHex(h, s, l), label: 'Base' },
          { hex: hslToHex(h + 120, s, l), label: '+120\u00b0' },
          { hex: hslToHex(h + 240, s, l), label: '+240\u00b0' }
        ]
      },
      {
        name: 'Split-Complementary',
        desc: '\u30b9\u30d7\u30ea\u30c3\u30c8\u30b3\u30f3\u30d7 -- \u88dc\u8272\u306e\u4e21\u96a3',
        colors: [
          { hex: hslToHex(h, s, l), label: 'Base' },
          { hex: hslToHex(h + 150, s, l), label: '+150\u00b0' },
          { hex: hslToHex(h + 210, s, l), label: '+210\u00b0' }
        ]
      },
      {
        name: 'Monochromatic',
        desc: '\u30e2\u30ce\u30af\u30ed -- \u540c\u8272\u76f8\u3067\u660e\u5ea6\u9055\u30445\u6bb5\u968e',
        colors: [
          { hex: hslToHex(h, s, 20), label: 'L20' },
          { hex: hslToHex(h, s, 35), label: 'L35' },
          { hex: hslToHex(h, s, 50), label: 'L50' },
          { hex: hslToHex(h, s, 65), label: 'L65' },
          { hex: hslToHex(h, s, 80), label: 'L80' }
        ]
      }
    ];
  }

  // --- DOM ---
  const colorPicker = document.getElementById('colorPicker');
  const hexInput = document.getElementById('hexInput');
  const randomBtn = document.getElementById('randomBtn');
  const exportBtn = document.getElementById('exportBtn');
  const schemesEl = document.getElementById('schemes');
  const toastEl = document.getElementById('toast');
  const themeToggle = document.getElementById('themeToggle');

  let currentColor = '#3A7BD5';
  let toastTimer = null;

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      showToast(text + ' copied');
    }).catch(() => {
      showToast('Copy failed');
    });
  }

  function render(hex) {
    const schemes = getSchemes(hex);
    schemesEl.innerHTML = '';

    schemes.forEach(scheme => {
      const card = document.createElement('div');
      card.className = 'scheme-card';

      const title = document.createElement('div');
      title.className = 'scheme-title';
      title.textContent = scheme.name;

      const desc = document.createElement('div');
      desc.className = 'scheme-desc';
      desc.textContent = scheme.desc;

      const swatches = document.createElement('div');
      swatches.className = 'swatches';

      scheme.colors.forEach(c => {
        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.title = c.hex.toUpperCase() + ' (\u30af\u30ea\u30c3\u30af\u3067\u30b3\u30d4\u30fc)';
        swatch.addEventListener('click', () => copyText(c.hex.toUpperCase()));

        const colorDiv = document.createElement('div');
        colorDiv.className = 'swatch-color';
        colorDiv.style.background = c.hex;

        const hexLabel = document.createElement('div');
        hexLabel.className = 'swatch-hex';
        hexLabel.textContent = c.hex.toUpperCase();

        swatch.appendChild(colorDiv);
        swatch.appendChild(hexLabel);
        swatches.appendChild(swatch);
      });

      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(swatches);
      schemesEl.appendChild(card);
    });
  }

  function update(hex) {
    hex = hex.toUpperCase();
    currentColor = hex;
    colorPicker.value = hex;
    hexInput.value = hex;
    render(hex);
  }

  function isValidHex(v) {
    return /^#[0-9A-Fa-f]{6}$/.test(v);
  }

  colorPicker.addEventListener('input', () => {
    update(colorPicker.value);
  });

  hexInput.addEventListener('input', () => {
    let v = hexInput.value.trim();
    if (v.charAt(0) !== '#') v = '#' + v;
    if (isValidHex(v)) {
      update(v);
    }
  });

  hexInput.addEventListener('blur', () => {
    hexInput.value = currentColor;
  });

  randomBtn.addEventListener('click', () => {
    const hex = '#' + Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6, '0');
    update(hex);
  });

  exportBtn.addEventListener('click', () => {
    const schemes = getSchemes(currentColor);
    const lines = [':root {'];
    schemes.forEach(scheme => {
      const prefix = scheme.name.toLowerCase().replace(/[^a-z]/g, '-');
      scheme.colors.forEach((c, i) => {
        lines.push('  --' + prefix + '-' + (i + 1) + ': ' + c.hex.toUpperCase() + ';');
      });
    });
    lines.push('}');
    const css = lines.join('\n');
    copyText(css);
  });

  // --- Theme ---
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? 'Light' : 'Dark';
    localStorage.setItem('color-scheme-theme', theme);
  }

  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  const saved = localStorage.getItem('color-scheme-theme') || 'dark';
  applyTheme(saved);

  // --- Init ---
  update(currentColor);
})();
</script>

</body>
</html>
