<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Playfair+Display:wght@400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font-main: 'Inter', sans-serif;
  --bg: #060606;
  --text: #eee;
  --text-muted: #999;
  --btn-bg: #fff;
  --btn-text: #000;
  --overlay: rgba(0,0,0,0.5);
  --panel-bg: rgba(20,20,20,0.95);
  --border: rgba(255,255,255,0.1);
}

html, body {
  height: 100%;
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

body {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Background */
#bg-layer {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  z-index: 0;
  transition: opacity 0.5s;
}
#bg-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 1;
  display: none;
}

/* Nav */
.nav-link {
  position: fixed;
  top: 16px;
  left: 20px;
  z-index: 100;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.8rem;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.nav-link:hover { opacity: 1; }

/* Settings gear */
.gear-btn {
  position: fixed;
  top: 14px;
  right: 20px;
  z-index: 100;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.4rem;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.2s, transform 0.3s;
  line-height: 1;
}
.gear-btn:hover { opacity: 1; transform: rotate(45deg); }

/* Main content */
.main {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  text-align: center;
  width: 100%;
  padding: 20px;
}

.status-label {
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

.timer-display {
  font-size: clamp(4rem, 15vw, 8rem);
  font-weight: 700;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.set-display {
  font-size: clamp(0.8rem, 2.5vw, 1rem);
  color: var(--text-muted);
  letter-spacing: 0.1em;
}

/* Controls */
.controls {
  display: flex;
  gap: 12px;
  margin-top: 10px;
}

.controls button {
  background: var(--btn-bg);
  color: var(--btn-text);
  border: none;
  padding: 10px 28px;
  font-size: 0.9rem;
  font-family: var(--font-main);
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.15s;
}
.controls button:hover { opacity: 0.8; }
.controls button:disabled { opacity: 0.3; cursor: default; }

/* Settings panel */
.settings-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  display: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.settings-backdrop.open { display: block; opacity: 1; }

.settings-panel {
  position: fixed;
  top: 0;
  right: -420px;
  width: min(400px, 90vw);
  height: 100%;
  background: var(--panel-bg);
  z-index: 210;
  overflow-y: auto;
  padding: 30px 24px;
  transition: right 0.35s ease;
  border-left: 1px solid var(--border);
}
.settings-panel.open { right: 0; }

.settings-panel h2 {
  font-size: 1.1rem;
  margin-bottom: 24px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.setting-group {
  margin-bottom: 22px;
}
.setting-group label {
  display: block;
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.setting-group input[type="number"],
.setting-group select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  font-size: 0.9rem;
  font-family: var(--font-main);
}
.setting-group input[type="number"]:focus,
.setting-group select:focus {
  outline: none;
  border-color: rgba(255,255,255,0.3);
}
.setting-group select option {
  background: #1a1a1a;
  color: var(--text);
}

/* Background thumbnails */
.bg-thumbs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.bg-thumb {
  aspect-ratio: 3/2;
  border: 2px solid transparent;
  cursor: pointer;
  background-size: cover;
  background-position: center;
  transition: border-color 0.15s;
}
.bg-thumb.active { border-color: #fff; }
.bg-thumb.dark-solid { background: #060606; }

/* Upload buttons */
.upload-btn {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 6px 14px;
  font-size: 0.78rem;
  font-family: var(--font-main);
  cursor: pointer;
  transition: background 0.15s;
}
.upload-btn:hover { background: rgba(255,255,255,0.14); }

/* Range slider */
.range-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.range-row input[type="range"] {
  flex: 1;
  accent-color: #fff;
  height: 4px;
}
.range-val {
  font-size: 0.78rem;
  color: var(--text-muted);
  min-width: 32px;
  text-align: right;
}

/* BGM controls */
.bgm-info {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}
.checkbox-row input[type="checkbox"] {
  accent-color: #fff;
}
.checkbox-row label {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 0;
  text-transform: none;
  letter-spacing: 0;
}

.close-settings {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
}
.close-settings:hover { color: var(--text); }

/* Responsive */
@media (max-width: 480px) {
  .controls { flex-direction: column; gap: 8px; }
  .controls button { width: 200px; }
  .bg-thumbs { grid-template-columns: repeat(2, 1fr); }
}
</style>

</head>
<body>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<a href="../" class="nav-link" id="navLink">秘密倉庫</a>
<button class="gear-btn" id="gearBtn" aria-label="設定">&#9881;</button>

<div class="main">
  <div class="status-label" id="statusLabel">作業中</div>
  <div class="timer-display" id="timerDisplay">25:00</div>
  <div class="set-display" id="setDisplay">1 / 4</div>
  <div class="controls">
    <button id="startBtn">START</button>
    <button id="pauseBtn" disabled>PAUSE</button>
    <button id="resetBtn">RESET</button>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-backdrop" id="settingsBackdrop"></div>
<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" id="closeSettings">&times;</button>
  <h2>SETTINGS</h2>

  <div class="setting-group">
    <label>作業時間（分）</label>
    <input type="number" id="setWork" min="5" max="60" value="25">
  </div>
  <div class="setting-group">
    <label>休憩時間（分）</label>
    <input type="number" id="setBreak" min="1" max="30" value="5">
  </div>
  <div class="setting-group">
    <label>セット数</label>
    <input type="number" id="setSets" min="1" max="10" value="4">
  </div>

  <div class="setting-group">
    <label>背景</label>
    <div class="bg-thumbs">
      <div class="bg-thumb dark-solid active" data-bg="none" title="無地ダーク"></div>
      <div class="bg-thumb" data-bg="img/bg-cafe.png" title="カフェ風" style="background-image:url('img/bg-cafe.png')"></div>
      <div class="bg-thumb" data-bg="img/bg-study.png" title="夜の書斎風" style="background-image:url('img/bg-study.png')"></div>
      <div class="bg-thumb" data-bg="img/bg-nature.png" title="自然・森林風" style="background-image:url('img/bg-nature.png')"></div>
    </div>
    <label class="upload-btn" id="bgUploadLabel">
      画像をアップロード
      <input type="file" accept="image/*" id="bgUpload" style="display:none">
    </label>
  </div>

  <div class="setting-group">
    <label>フォント</label>
    <select id="setFont">
      <option value="'Inter', sans-serif">Inter</option>
      <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
      <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
      <option value="'Playfair Display', serif">Playfair Display</option>
      <option value="'Zen Maru Gothic', sans-serif">Zen Maru Gothic</option>
    </select>
  </div>

  <div class="setting-group">
    <label>アラーム音</label>
    <select id="setAlarm">
      <option value="beep">シンプルビープ</option>
      <option value="chime">やさしいチャイム</option>
      <option value="alarm">強めのアラーム</option>
    </select>
    <div class="range-row" style="margin-top:8px">
      <input type="range" id="alarmVol" min="0" max="100" value="50">
      <span class="range-val" id="alarmVolVal">50</span>
    </div>
    <button class="upload-btn" id="testAlarm" style="margin-top:6px">テスト再生</button>
  </div>

  <div class="setting-group">
    <label>BGM</label>
    <label class="upload-btn">
      音声ファイルをアップロード
      <input type="file" accept="audio/*" id="bgmUpload" style="display:none">
    </label>
    <div class="bgm-info" id="bgmInfo">未設定</div>
    <div class="range-row" style="margin-top:8px">
      <input type="range" id="bgmVol" min="0" max="100" value="30">
      <span class="range-val" id="bgmVolVal">30</span>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="bgmOnBreak">
      <label for="bgmOnBreak">休憩中もBGMを継続</label>
    </div>
    <button class="upload-btn" id="clearBgm" style="margin-top:6px">BGMを削除</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ---- State ----
  const defaults = {
    workMin: 25, breakMin: 5, sets: 4,
    bg: 'none', customBg: null,
    font: "'Inter', sans-serif",
    alarm: 'beep', alarmVol: 50,
    bgmVol: 30, bgmOnBreak: false, bgmName: ''
  };

  let config = { ...defaults };
  let timeLeft = config.workMin * 60;
  let totalTime = timeLeft;
  let currentSet = 1;
  let isWork = true;
  let running = false;
  let timerId = null;

  // ---- DOM refs ----
  const $ = id => document.getElementById(id);
  const timerDisplay = $('timerDisplay');
  const statusLabel = $('statusLabel');
  const setDisplay = $('setDisplay');
  const startBtn = $('startBtn');
  const pauseBtn = $('pauseBtn');
  const resetBtn = $('resetBtn');
  const gearBtn = $('gearBtn');
  const settingsPanel = $('settingsPanel');
  const settingsBackdrop = $('settingsBackdrop');
  const closeSettings = $('closeSettings');
  const bgLayer = $('bg-layer');
  const bgOverlay = $('bg-overlay');
  const navLink = $('navLink');

  // ---- Load config ----
  function loadConfig() {
    try {
      const saved = localStorage.getItem('pomodoro-config');
      if (saved) config = { ...defaults, ...JSON.parse(saved) };
    } catch(e) {}
  }

  function saveConfig() {
    localStorage.setItem('pomodoro-config', JSON.stringify(config));
  }

  // ---- BGM ----
  let bgmAudio = null;
  let bgmObjectUrl = null;

  function loadBgmFromStorage() {
    try {
      const data = localStorage.getItem('pomodoro-bgm');
      if (data) {
        const blob = dataURItoBlob(data);
        bgmObjectUrl = URL.createObjectURL(blob);
        bgmAudio = new Audio(bgmObjectUrl);
        bgmAudio.loop = true;
        bgmAudio.volume = config.bgmVol / 100;
        $('bgmInfo').textContent = config.bgmName || 'カスタムBGM';
      }
    } catch(e) {
      $('bgmInfo').textContent = '未設定';
    }
  }

  function dataURItoBlob(dataURI) {
    const [header, b64] = dataURI.split(',');
    const mime = header.match(/:(.*?);/)[1];
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new Blob([arr], { type: mime });
  }

  function startBgm() {
    if (bgmAudio) {
      bgmAudio.volume = config.bgmVol / 100;
      bgmAudio.play().catch(() => {});
    }
  }

  function stopBgm() {
    if (bgmAudio) {
      bgmAudio.pause();
      bgmAudio.currentTime = 0;
    }
  }

  function pauseBgm() {
    if (bgmAudio) bgmAudio.pause();
  }

  function resumeBgm() {
    if (bgmAudio && running) bgmAudio.play().catch(() => {});
  }

  // ---- Alarm sounds (Web Audio API) ----
  function playAlarmSound() {
    const vol = config.alarmVol / 100;
    const type = config.alarm;
    if (type === 'beep') playBeep(vol);
    else if (type === 'chime') playChime(vol);
    else if (type === 'alarm') playStrongAlarm(vol);
  }

  function playBeep(vol) {
    const ctx = new AudioContext();
    for (let i = 0; i < 3; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 800;
      osc.type = 'sine';
      gain.gain.setValueAtTime(vol * 0.4, ctx.currentTime + i * 0.4);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.4 + 0.3);
      osc.start(ctx.currentTime + i * 0.4);
      osc.stop(ctx.currentTime + i * 0.4 + 0.3);
    }
  }

  function playChime(vol) {
    const ctx = new AudioContext();
    const freqs = [523, 659, 784, 1047];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(vol * 0.3, ctx.currentTime + i * 0.25);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.6);
      osc.start(ctx.currentTime + i * 0.25);
      osc.stop(ctx.currentTime + i * 0.25 + 0.6);
    });
  }

  function playStrongAlarm(vol) {
    const ctx = new AudioContext();
    for (let i = 0; i < 5; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = i % 2 === 0 ? 880 : 660;
      osc.type = 'square';
      gain.gain.setValueAtTime(vol * 0.25, ctx.currentTime + i * 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.2 + 0.18);
      osc.start(ctx.currentTime + i * 0.2);
      osc.stop(ctx.currentTime + i * 0.2 + 0.18);
    }
  }

  // ---- Notification ----
  function requestNotification() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  function sendNotification(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, icon: '' });
    }
  }

  // ---- Display ----
  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function updateDisplay() {
    timerDisplay.textContent = formatTime(timeLeft);
    statusLabel.textContent = isWork ? '作業中' : '休憩中';
    setDisplay.textContent = currentSet + ' / ' + config.sets;
    const stateText = isWork ? '作業中' : '休憩中';
    document.title = formatTime(timeLeft) + ' ' + stateText + ' - Pomodoro';
    navLink.style.opacity = running ? '0.3' : '0.5';
  }

  // ---- Timer logic ----
  function tick() {
    if (timeLeft > 0) {
      timeLeft--;
      updateDisplay();
    } else {
      clearInterval(timerId);
      timerId = null;
      playAlarmSound();

      if (isWork) {
        sendNotification('作業完了', 'セット ' + currentSet + ' / ' + config.sets + ' 完了。休憩に入ります。');
        if (currentSet >= config.sets) {
          // All sets complete
          sendNotification('全セット完了', 'お疲れさまでした!');
          stopBgm();
          running = false;
          startBtn.disabled = false;
          pauseBtn.disabled = true;
          statusLabel.textContent = '完了';
          document.title = '完了 - Pomodoro';
          return;
        }
        isWork = false;
        timeLeft = config.breakMin * 60;
        if (!config.bgmOnBreak) pauseBgm();
      } else {
        sendNotification('休憩終了', '次のセットを開始します。');
        isWork = true;
        currentSet++;
        timeLeft = config.workMin * 60;
        if (bgmAudio) startBgm();
      }
      updateDisplay();
      timerId = setInterval(tick, 1000);
    }
  }

  function startTimer() {
    if (running) return;
    requestNotification();
    running = true;
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    if (isWork) startBgm();
    else if (config.bgmOnBreak) startBgm();
    timerId = setInterval(tick, 1000);
  }

  function pauseTimer() {
    if (!running) return;
    running = false;
    clearInterval(timerId);
    timerId = null;
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    pauseBgm();
  }

  function resetTimer() {
    running = false;
    clearInterval(timerId);
    timerId = null;
    isWork = true;
    currentSet = 1;
    timeLeft = config.workMin * 60;
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBgm();
    updateDisplay();
  }

  // ---- Settings UI ----
  function openSettings() {
    settingsPanel.classList.add('open');
    settingsBackdrop.classList.add('open');
  }

  function closeSettingsPanel() {
    settingsPanel.classList.remove('open');
    settingsBackdrop.classList.remove('open');
  }

  function applyConfig() {
    // Font
    document.documentElement.style.setProperty('--font-main', config.font);
    document.body.style.fontFamily = config.font;
    timerDisplay.style.fontFamily = config.font;

    // Background
    if (config.bg === 'none' && !config.customBg) {
      bgLayer.style.backgroundImage = 'none';
      bgOverlay.style.display = 'none';
    } else if (config.customBg) {
      bgLayer.style.backgroundImage = 'url(' + config.customBg + ')';
      bgOverlay.style.display = 'block';
    } else {
      bgLayer.style.backgroundImage = 'url(' + config.bg + ')';
      bgOverlay.style.display = 'block';
    }

    // Active thumb
    document.querySelectorAll('.bg-thumb').forEach(t => {
      t.classList.toggle('active', !config.customBg && t.dataset.bg === config.bg);
    });

    // Inputs
    $('setWork').value = config.workMin;
    $('setBreak').value = config.breakMin;
    $('setSets').value = config.sets;
    $('setFont').value = config.font;
    $('setAlarm').value = config.alarm;
    $('alarmVol').value = config.alarmVol;
    $('alarmVolVal').textContent = config.alarmVol;
    $('bgmVol').value = config.bgmVol;
    $('bgmVolVal').textContent = config.bgmVol;
    $('bgmOnBreak').checked = config.bgmOnBreak;
  }

  function bindSettings() {
    gearBtn.addEventListener('click', openSettings);
    closeSettings.addEventListener('click', closeSettingsPanel);
    settingsBackdrop.addEventListener('click', closeSettingsPanel);

    // Number inputs
    $('setWork').addEventListener('change', function() {
      config.workMin = Math.min(60, Math.max(5, parseInt(this.value) || 25));
      this.value = config.workMin;
      if (!running) { timeLeft = config.workMin * 60; updateDisplay(); }
      saveConfig();
    });
    $('setBreak').addEventListener('change', function() {
      config.breakMin = Math.min(30, Math.max(1, parseInt(this.value) || 5));
      this.value = config.breakMin;
      saveConfig();
    });
    $('setSets').addEventListener('change', function() {
      config.sets = Math.min(10, Math.max(1, parseInt(this.value) || 4));
      this.value = config.sets;
      if (!running) updateDisplay();
      saveConfig();
    });

    // Font
    $('setFont').addEventListener('change', function() {
      config.font = this.value;
      applyConfig();
      saveConfig();
    });

    // Background thumbs
    document.querySelectorAll('.bg-thumb').forEach(thumb => {
      thumb.addEventListener('click', function() {
        config.bg = this.dataset.bg;
        config.customBg = null;
        applyConfig();
        saveConfig();
      });
    });

    // Background upload
    $('bgUpload').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        config.customBg = e.target.result;
        config.bg = 'custom';
        try { localStorage.setItem('pomodoro-custom-bg', config.customBg); } catch(err) {}
        applyConfig();
        saveConfig();
      };
      reader.readAsDataURL(file);
    });

    // Alarm
    $('setAlarm').addEventListener('change', function() {
      config.alarm = this.value;
      saveConfig();
    });
    $('alarmVol').addEventListener('input', function() {
      config.alarmVol = parseInt(this.value);
      $('alarmVolVal').textContent = config.alarmVol;
      saveConfig();
    });
    $('testAlarm').addEventListener('click', playAlarmSound);

    // BGM upload
    $('bgmUpload').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          localStorage.setItem('pomodoro-bgm', e.target.result);
          config.bgmName = file.name;
          saveConfig();
          if (bgmObjectUrl) URL.revokeObjectURL(bgmObjectUrl);
          bgmObjectUrl = URL.createObjectURL(file);
          bgmAudio = new Audio(bgmObjectUrl);
          bgmAudio.loop = true;
          bgmAudio.volume = config.bgmVol / 100;
          $('bgmInfo').textContent = file.name;
        } catch(err) {
          $('bgmInfo').textContent = 'ファイルが大きすぎます';
        }
      };
      reader.readAsDataURL(file);
    });

    $('bgmVol').addEventListener('input', function() {
      config.bgmVol = parseInt(this.value);
      $('bgmVolVal').textContent = config.bgmVol;
      if (bgmAudio) bgmAudio.volume = config.bgmVol / 100;
      saveConfig();
    });

    $('bgmOnBreak').addEventListener('change', function() {
      config.bgmOnBreak = this.checked;
      saveConfig();
    });

    $('clearBgm').addEventListener('click', function() {
      localStorage.removeItem('pomodoro-bgm');
      config.bgmName = '';
      saveConfig();
      stopBgm();
      bgmAudio = null;
      if (bgmObjectUrl) URL.revokeObjectURL(bgmObjectUrl);
      bgmObjectUrl = null;
      $('bgmInfo').textContent = '未設定';
    });
  }

  // ---- Init ----
  function init() {
    loadConfig();

    // Load custom bg from separate key (may be large)
    if (config.bg === 'custom') {
      try {
        config.customBg = localStorage.getItem('pomodoro-custom-bg');
      } catch(e) {}
    }

    timeLeft = config.workMin * 60;
    applyConfig();
    updateDisplay();
    bindSettings();
    loadBgmFromStorage();

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        running ? pauseTimer() : startTimer();
      } else if (e.code === 'KeyR') {
        resetTimer();
      }
    });
  }

  init();
})();
</script>
</body>
</html>
