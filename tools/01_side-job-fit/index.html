<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>

  <meta property="og:title" content="副業適性診断 | ダイスケマンの秘密倉庫">
  <meta property="og:description" content="15問であなたに向いている副業タイプを診断します。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --max-w: 640px;
      --pad: 24px;
    }

    [data-theme="dark"] {
      --bg: #060606;
      --bg-card: #0f0f0f;
      --bg-card-hover: #1a1a1a;
      --border: #181818;
      --border-hover: #2a2a2a;
      --text: #eee;
      --text-sub: #9a9a9a;
      --text-muted: #555;
      --bar-fg: #ccc;
      --bar-bg: #1a1a1a;
      --btn-bg: #eee;
      --btn-text: #060606;
      --btn-hover: #fff;
    }

    [data-theme="light"] {
      --bg: #f5f3f0;
      --bg-card: #fff;
      --bg-card-hover: #eee;
      --border: #ddd;
      --border-hover: #bbb;
      --text: #1a1a1a;
      --text-sub: #666;
      --text-muted: #999;
      --bar-fg: #333;
      --bar-bg: #ddd;
      --btn-bg: #1a1a1a;
      --btn-text: #fff;
      --btn-hover: #000;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s var(--ease), color 0.4s var(--ease);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    .nav {
      padding: 16px var(--pad);
      display: flex; justify-content: space-between; align-items: center;
    }

    .nav a {
      font-size: 0.7rem; font-weight: 500;
      color: var(--text-muted); text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .nav a:hover { color: var(--text); }

    .nav a svg {
      width: 12px; height: 12px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .theme-toggle {
      background: none; border: 1px solid var(--border);
      color: var(--text-sub); cursor: pointer;
      font-size: 0.65rem; font-family: var(--font);
      padding: 6px 12px; border-radius: 4px;
      transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--text-sub); color: var(--text); }

    .main {
      flex: 1;
      max-width: var(--max-w); width: 100%;
      margin: 0 auto; padding: 40px var(--pad) 60px;
    }

    .tool-title {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 800; letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .tool-subtitle {
      font-size: 0.82rem; color: var(--text-muted);
      margin-bottom: 40px;
      transition: color 0.4s var(--ease);
    }

    /* START SCREEN */
    .start-screen { text-align: center; }
    .start-screen .start-desc {
      font-size: 0.85rem; color: var(--text-sub);
      line-height: 2; margin-bottom: 32px; text-align: left;
    }

    .btn-start {
      display: inline-block;
      background: var(--btn-bg); color: var(--btn-text);
      font-weight: 700; font-size: 0.9rem;
      padding: 14px 40px; border-radius: 6px;
      border: none; cursor: pointer;
      font-family: var(--font);
      transition: all 0.3s var(--ease);
    }
    .btn-start:hover { background: var(--btn-hover); transform: translateY(-1px); }

    /* PROGRESS */
    .progress-wrap { display: none; margin-bottom: 32px; }
    .progress-wrap.active { display: block; }

    .progress-bar {
      width: 100%; height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: var(--text-sub);
      border-radius: 2px;
      transition: width 0.5s var(--ease);
    }
    .progress-text {
      font-size: 0.65rem; color: var(--text-muted);
      transition: color 0.4s var(--ease);
    }

    /* QUESTION */
    .quiz-wrap { display: none; }
    .quiz-wrap.active { display: block; }

    .question-img {
      width: 100%; height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 16px;
      opacity: 0.85;
    }

    .question-text {
      font-size: 1.05rem; font-weight: 600;
      margin-bottom: 20px; line-height: 1.7;
    }
    .choices { display: flex; flex-direction: column; gap: 10px; }

    .choice {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 0.88rem; font-weight: 400;
      color: var(--text);
      cursor: pointer;
      transition: all 0.25s var(--ease);
      font-family: var(--font);
      text-align: left; width: 100%;
    }
    .choice:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateX(4px);
    }
    .choice:active {
      transform: translateX(4px) scale(0.99);
    }

    /* BACK BUTTON */
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; color: var(--text-muted);
      font-weight: 500; font-size: 0.75rem;
      padding: 10px 0; margin-top: 16px;
      border: none; cursor: pointer;
      font-family: var(--font);
      transition: color 0.2s;
    }
    .btn-back:hover { color: var(--text); }
    .btn-back svg {
      width: 14px; height: 14px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* RESULT */
    .result { display: none; }
    .result.active { display: block; }

    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 28px;
      transition: all 0.4s var(--ease);
    }

    .result-img {
      width: 100%; height: 220px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 24px;
      opacity: 0.9;
    }

    .result-label {
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 12px;
      text-align: center;
    }

    .result-type {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 900; margin-bottom: 6px;
      letter-spacing: -0.02em; text-align: center;
    }

    .result-tagline {
      font-size: 0.85rem; color: var(--text-sub);
      font-weight: 500; margin-bottom: 28px;
      text-align: center;
    }

    .result-section {
      margin-bottom: 24px;
    }
    .result-section-title {
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .result-section p, .result-section li {
      font-size: 0.85rem; color: var(--text-sub);
      line-height: 1.9;
    }
    .result-section ul {
      list-style: none; padding: 0;
    }
    .result-section ul li::before {
      content: "- ";
      color: var(--text-muted);
    }

    /* SCORE BARS */
    .score-bars { margin-top: 8px; }
    .score-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .score-label {
      font-size: 0.72rem; color: var(--text-sub);
      width: 140px; flex-shrink: 0;
      text-align: right;
    }
    .score-track {
      flex: 1; height: 6px;
      background: var(--bar-bg);
      border-radius: 3px; overflow: hidden;
    }
    .score-bar {
      height: 100%;
      background: var(--bar-fg);
      border-radius: 3px;
      transition: width 0.8s var(--ease);
    }
    .score-val {
      font-size: 0.65rem; color: var(--text-muted);
      width: 28px;
    }

    .result-actions {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap; margin-top: 32px;
    }

    .btn-share {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--btn-bg); color: var(--btn-text);
      font-weight: 600; font-size: 0.82rem;
      padding: 12px 24px; border-radius: 6px;
      border: none; cursor: pointer;
      font-family: var(--font);
      transition: all 0.3s var(--ease);
    }
    .btn-share:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    .btn-retry {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--text-sub);
      font-weight: 500; font-size: 0.82rem;
      padding: 12px 24px; border-radius: 6px;
      border: 1px solid var(--border); cursor: pointer;
      font-family: var(--font);
      transition: all 0.3s var(--ease);
    }
    .btn-retry:hover {
      border-color: var(--text-sub); color: var(--text);
    }

    .footer {
      padding: 20px var(--pad);
      text-align: center;
    }
    .footer p {
      font-size: 0.6rem; color: var(--text-muted);
      line-height: 1.8;
      transition: color 0.4s var(--ease);
    }

    @media (max-width: 480px) {
      .score-label { width: 100px; font-size: 0.65rem; }
      .result-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="nav">
    <a href="../">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      秘密倉庫に戻る

    <button class="theme-toggle" id="themeToggle">LIGHT</button>
  </div>

  <div class="main">
    <h1 class="tool-title">副業適性診断</h1>
    <p class="tool-subtitle">15問であなたに合った副業タイプを診断します</p>

    <div id="startScreen" class="start-screen">
      <div class="start-desc">
        ホランド理論（RIASEC）とビッグファイブをベースに、あなたの日常の行動パターンから最適な副業タイプを導き出します。所要時間は約3分です。<br><br><strong style="font-size:1rem;color:var(--text);">深く考えず、直感で選んでください。</strong>
      </div>
      <button class="btn-start" id="btnStart">診断を始める</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>

    <div class="quiz-wrap" id="quiz"></div>

    <div class="result" id="result">
      <div class="result-card" id="resultCard"></div>

  <div class="footer">
    <p>
      本診断はホランド理論（RIASEC）とビッグファイブを参考に作成しています。<br>
      個人の状況により結果が異なる場合があります。参考としてお楽しみください。
    </p>
  </div>

  <script>
    // --- Theme ---
    const themeToggle = document.getElementById('themeToggle');
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      themeToggle.textContent = t === 'dark' ? 'LIGHT' : 'DARK';
      localStorage.setItem('sjf-theme', t);
    }
    themeToggle.addEventListener('click', () => {
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    setTheme(localStorage.getItem('sjf-theme') || 'dark');

    // --- App State ---
    let current = 0;
    const scores = [0, 0, 0, 0, 0]; // creator, builder, stock, consul, researcher
    const answerHistory = []; // stores chosen index per question for back navigation

    const startScreen = document.getElementById('startScreen');
    const progressWrap = document.getElementById('progressWrap');
    const quiz = document.getElementById('quiz');
    const result = document.getElementById('result');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    document.getElementById('btnStart').addEventListener('click', () => {
      startScreen.style.display = 'none';
      progressWrap.classList.add('active');
      quiz.classList.add('active');
      renderQuestion();
    });

    function renderQuestion() {
      if (current >= questions.length) {
        showResult();
        return;
      }

      const q = questions[current];
      const pct = (current / questions.length) * 100;
      progressFill.style.width = pct + '%';
      progressText.textContent = 'Q' + (current + 1) + ' / ' + questions.length;

      var imgHtml = q.img ? '<img class="question-img" src="' + q.img + '" alt="">' : '';

      var backHtml = '';
      if (current > 0) {
        backHtml = '<button class="btn-back" id="btnBack"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>前の質問に戻る</button>';
      }

      quiz.innerHTML =
        imgHtml +
        '<div class="question-text">' + q.q + '</div>' +
        '<div class="choices">' +
        q.a.map(function(a, i) {
          return '<button class="choice" data-idx="' + i + '">' + a.text + '</button>';
        }).join('') +
        '</div>' +
        backHtml;

      quiz.querySelectorAll('.choice').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.dataset.idx);
          q.a[idx].scores.forEach(function(s, j) { scores[j] += s; });
          answerHistory.push(idx);
          current++;
          renderQuestion();
        });
      });

      var backBtn = document.getElementById('btnBack');
      if (backBtn) {
        backBtn.addEventListener('click', function() {
          current--;
          var prevIdx = answerHistory.pop();
          var prevQ = questions[current];
          prevQ.a[prevIdx].scores.forEach(function(s, j) { scores[j] -= s; });
          renderQuestion();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
    }

    function showResult() {
      quiz.classList.remove('active');
      progressFill.style.width = '100%';
      progressText.textContent = '診断完了';

      var maxIdx = 0;
      var maxVal = scores[0];
      for (var i = 1; i < scores.length; i++) {
        if (scores[i] > maxVal) { maxVal = scores[i]; maxIdx = i; }
      }

      var t = typeData[maxIdx];
      var totalMax = Math.max.apply(null, scores);
      if (totalMax === 0) totalMax = 1;

      var typeNames = [
        'コンテンツクリエイター',
        'ツールビルダー',
        'ストック構築',
        'コンサル・メンター',
        'リサーチャー・分析'
      ];

      var html = '';
      html += '<div class="result-label">YOUR SIDE JOB TYPE</div>';
      if (t.img) {
        html += '<img class="result-img" src="' + t.img + '" alt="">';
      }
      html += '<div class="result-type">' + t.name + '</div>';
      html += '<div class="result-tagline">' + t.tagline + '</div>';

      html += '<div class="result-section">';
      html += '<div class="result-section-title">あなたの行動パターン</div>';
      html += '<p>' + t.pattern + '</p>';
      html += '</div>';

      html += '<div class="result-section">';
      html += '<div class="result-section-title">強み</div>';
      html += '<ul>' + t.strengths.map(function(s) { return '<li>' + s + '</li>'; }).join('') + '</ul>';
      html += '</div>';

      html += '<div class="result-section">';
      html += '<div class="result-section-title">落とし穴</div>';
      html += '<ul>' + t.pitfalls.map(function(s) { return '<li>' + s + '</li>'; }).join('') + '</ul>';
      html += '</div>';

      html += '<div class="result-section">';
      html += '<div class="result-section-title">最初の一歩</div>';
      html += '<p>' + t.firstStep + '</p>';
      html += '</div>';

      html += '<div class="result-section">';
      html += '<div class="result-section-title">相性の良い副業</div>';
      html += '<ul>' + t.jobs.map(function(s) { return '<li>' + s + '</li>'; }).join('') + '</ul>';
      html += '</div>';

      html += '<div class="result-section">';
      html += '<div class="result-section-title">スコア分布</div>';
      html += '<div class="score-bars">';
      for (var i = 0; i < 5; i++) {
        var pct = Math.round((scores[i] / totalMax) * 100);
        html += '<div class="score-row">';
        html += '<div class="score-label">' + typeNames[i] + '</div>';
        html += '<div class="score-track"><div class="score-bar" style="width:0%" data-w="' + pct + '%"></div></div>';
        html += '<div class="score-val">' + pct + '%</div>';
        html += '</div>';
      }
      html += '</div></div>';

      html += '<div class="result-actions">';
      html += '<button class="btn-share" id="btnShare">Xでシェア</button>';
      html += '<button class="btn-retry" id="btnRetry">もう一度</button>';
      html += '</div>';

      document.getElementById('resultCard').innerHTML = html;
      result.classList.add('active');

      // Animate bars
      setTimeout(function() {
        document.querySelectorAll('.score-bar').forEach(function(bar) {
          bar.style.width = bar.dataset.w;
        });
      }, 100);

      // Share button
      document.getElementById('btnShare').addEventListener('click', function() {
        var text = '副業適性診断の結果は「' + t.name + '」でした！\n' + t.tagline + '\n\nダイスケマンの秘密倉庫で診断 →';
        window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
      });

      // Retry button
      document.getElementById('btnRetry').addEventListener('click', function() {
        current = 0;
        answerHistory.length = 0;
        for (var i = 0; i < scores.length; i++) scores[i] = 0;
        result.classList.remove('active');
        quiz.classList.add('active');
        progressWrap.classList.add('active');
        renderQuestion();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  </script>
